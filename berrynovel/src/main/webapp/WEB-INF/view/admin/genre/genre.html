<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Genre Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/src/main/webapp/resources/admin/css/sidebar.css">
    <link rel="stylesheet" href="/src/main/webapp/resources/admin/css/font.css">
    <link rel="stylesheet" href="/src/main/webapp/resources/admin/css/genre/genre.css">

</head>

<body>

    <div class="layout">
        <!-- SIDEBAR -->
        <div id="sidebar"></div>


        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="genre-card">
                <div class="genre-header">
                    Manager Genre
                </div>

                <button class="btn create-btn fw-bold" onclick="openPopup()">Add Genre</button>

                <div class="table-wrapper">
                    <table class="table genre-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Code</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Action</td>
                                <td>ACT</td>

                                <td class="status status-published">
                                    Active
                                </td>

                                <td class="action">
                                    <button class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>

                                    <button class="btn btn-success btn-toggle-status">
                                        <i class="fa-solid fa-circle-check"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>2</td>
                                <td>Fantasy</td>
                                <td>FAN</td>

                                <td class="status status-hidden">
                                    InActive
                                </td>

                                <td class="action">
                                    <button class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>

                                    <button class="btn btn-delete btn-toggle-status">
                                        <i class="fa-solid fa-circle-xmark"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>3</td>
                                <td>Drama</td>
                                <td>DRA</td>

                                <td class="status status-hidden">
                                    InActive
                                </td>

                                <td class="action">
                                    <button class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>

                                    <button class="btn btn-delete btn-toggle-status">
                                        <i class="fa-solid fa-circle-xmark"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>4</td>
                                <td>Maturey</td>
                                <td>MAT</td>

                                <td class="status status-hidden">
                                    InActive
                                </td>

                                <td class="action">
                                    <button class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>

                                    <button class="btn btn-delete btn-toggle-status">
                                        <i class="fa-solid fa-circle-xmark"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>5</td>
                                <td>Tragedy</td>
                                <td>TRA</td>

                                <td class="status status-hidden">
                                    InActive
                                </td>

                                <td class="action">
                                    <button class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>

                                    <button class="btn btn-delete btn-toggle-status">
                                        <i class="fa-solid fa-circle-xmark"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr>
                                <td>6</td>
                                <td>Magic</td>
                                <td>MAG</td>

                                <td class="status status-hidden">
                                    InActive
                                </td>

                                <td class="action">
                                    <button class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>

                                    <button class="btn btn-delete btn-toggle-status">
                                        <i class="fa-solid fa-circle-xmark"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-box">
                    <a class="page-btn disabled">«</a>

                    <a class="page-btn active">1</a>

                    <a class="page-btn disabled">»</a>
                </div>
            </div>
        </div>
    </div>

    <!-- POPUP ADD GENRE -->
    <div class="popup-overlay" id="genrePopup">
        <div class="popup-box">
            <div class="popup-header">
                <h2 class="fw-semibold">Add New Genre</h2>
                <span class="close-btn" onclick="closePopup()">×</span>
            </div>

            <div class="popup-body">

                <label>Genre Name</label>
                <input type="text" placeholder="Enter category name">

                <label>Code</label>
                <input type="text" placeholder="Enter code">

                <div class="popup-action">
                    <button class="create-btn">CREATE</button>
                </div>
            </div>
        </div>
    </div>



    <script>
        document.querySelectorAll(".action button:last-child").forEach(button => {
            button.addEventListener("click", function () {
                const row = this.closest("tr");
                const statusCell = row.querySelector(".status");
                const icon = this.querySelector("i");

                if (statusCell.textContent.trim() === "Active") {
                    statusCell.textContent = "InActive";
                    statusCell.classList.remove("status-published");
                    statusCell.classList.add("status-hidden");

                    icon.classList.remove("fa-circle-check");
                    icon.classList.add("fa-circle-xmark");

                    this.classList.remove("btn-success");
                    this.classList.add("btn-delete");
                } else {
                    statusCell.textContent = "Active";
                    statusCell.classList.remove("status-hidden");
                    statusCell.classList.add("status-published");

                    icon.classList.remove("fa-circle-xmark");
                    icon.classList.add("fa-circle-check");

                    this.classList.remove("btn-delete");
                    this.classList.add("btn-success");
                }
            });
        });
    </script>

    <script>
        function openPopup() {
            document.getElementById("genrePopup").style.display = "flex";
        }
        function closePopup() {
            document.getElementById("genrePopup").style.display = "none";
        }
    </script>

    <script src="/src/main/webapp/resources/admin/js/sidebar.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
