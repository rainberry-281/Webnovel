<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Novel Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/src/main/webapp/resources/admin/css/dashboard.css">

    <link rel="stylesheet" href="/src/main/webapp/resources/admin/css/sidebar.css">

    <link rel="stylesheet" href="/src/main/webapp/resources/admin/css/font.css">

</head>

<body>

    <div class="layout">
        <div class="sidebar">

            <h4 class="logo">Novel Admin</h4>

            <ul class="menu">

                <li class="active">
                    <a href="dashboard.html">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="../user/user.html">
                        <i class="fa-solid fa-users"></i>
                        <span>User</span>
                    </a>
                </li>

                <li>
                    <a href="../novel/novel.html">
                        <i class="fa-solid fa-book"></i>
                        <span>Novel</span>
                    </a>
                </li>

                <li>
                    <a href="">
                        <i class="fa-solid fa-comments"></i>
                        <span>Comment</span>
                    </a>
                </li>

                <li>
                    <a href="">
                        <i class="fa-solid fa-layer-group"></i>
                        <span>Category</span>
                    </a>
                </li>

            </ul>

        </div>


        <!-- MAIN CONTENT -->
        <div class="main-content">

            <div class="container-fluid">

                <h2 class="mb-4">Dashboard</h2>

                <div class="row g-5">

                    <div class="col-md-6">
                        <div class="card dashboard-card">
                            <div class="card-body d-flex align-items-center">

                                <div>
                                    <i class="fa-solid fa-users fa-2x"></i>
                                </div>

                                <div class="ms-3">
                                    <h5>Users</h5>
                                    <h2>120</h2>
                                </div>

                            </div>
                        </div>
                    </div>


                    <div class="col-md-6">
                        <div class="card dashboard-card">
                            <div class="card-body d-flex align-items-center">

                                <div>
                                    <i class="fa-solid fa-book fa-2x"></i>
                                </div>

                                <div class="ms-3">
                                    <h5>Novels</h5>
                                    <h2>80</h2>
                                </div>

                            </div>
                        </div>
                    </div>


                    <div class="col-md-6">
                        <div class="card dashboard-card">
                            <div class="card-body d-flex align-items-center">

                                <div>
                                    <i class="fa-solid fa-comments fa-2x"></i>
                                </div>

                                <div class="ms-3">
                                    <h5>Comments</h5>
                                    <h2>350</h2>
                                </div>

                            </div>
                        </div>
                    </div>


                    <div class="col-md-6">
                        <div class="card dashboard-card">
                            <div class="card-body d-flex align-items-center">

                                <div>
                                    <i class="fa-solid fa-layer-group fa-2x"></i>
                                </div>

                                <div class="ms-3">
                                    <h5>Categories</h5>
                                    <h2>12</h2>
                                </div>

                            </div>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
