<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Novel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/src/main/webapp/resources/admin/css/novel/create.css">
    <link rel="stylesheet" href="/src/main/webapp/resources/admin/css/sidebar.css">
    <link rel="stylesheet" href="/src/main/webapp/resources/admin/css/font.css">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <h4 class="logo">Novel Admin</h4>

            <ul class="menu">

                <li>
                    <a href="../dashboard/dashboard.html">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="../user/user.html">
                        <i class="fa-solid fa-users"></i>
                        <span>User</span>
                    </a>
                </li>

                <li class="active">
                    <a href="../novel/novel.html">
                        <i class="fa-solid fa-book"></i>
                        <span>Novel</span>
                    </a>
                </li>

                <li>
                    <a href="">
                        <i class="fa-solid fa-comments"></i>
                        <span>Comment</span>
                    </a>
                </li>

                <li>
                    <a href="">
                        <i class="fa-solid fa-layer-group"></i>
                        <span>Category</span>
                    </a>
                </li>

            </ul>

        </div>

        <!-- MAIN -->
        <div class="main-content">

            <div class="create-user-card">

                <div class="form-header">
                    Update Novel
                </div>

                <form>

                    <div class="row">

                        <!-- NOVEL NAME -->
                        <div class="col-md-6 form-group">
                            <label>Novel name:</label>
                            <input type="text" class="form-control" value="Yondome wa Iyana Shi Zokusei Majutsushi">
                        </div>

                        <!-- AUTHOR -->
                        <div class="col-md-6 form-group">
                            <label>Author:</label>
                            <input type="text" class="form-control" value="Densuke">
                        </div>

                        <!-- STATUS -->
                        <div class="col-md-6 form-group select-role">

                            <label>Status</label>

                            <div class="select-wrapper">
                                <select class="form-control">
                                    <option>-----</option>
                                    <option selected>Ongoing</option>
                                    <option>Completed</option>
                                    <option>Dropped</option>
                                </select>

                                <i class="fa-solid fa-chevron-down"></i>
                            </div>

                        </div>

                        <!-- TYPE -->
                        <div class="col-md-6 form-group select-role">

                            <label>Type</label>

                            <div class="select-wrapper">
                                <select class="form-control">
                                    <option>-----</option>
                                    <option>Translated</option>
                                    <option selected>Original story</option>
                                </select>

                                <i class="fa-solid fa-chevron-down"></i>
                            </div>

                        </div>

                        <!-- GENRE -->
                        <div class="form-group genre-group">

                            <label>Genre</label>

                            <div class="genre-box">

                                <label class="genre-item">
                                    <input type="checkbox" checked> Action
                                </label>

                                <label class="genre-item">
                                    <input type="checkbox"> Drama
                                </label>

                                <label class="genre-item">
                                    <input type="checkbox" checked> Fantasy
                                </label>

                                <label class="genre-item">
                                    <input type="checkbox" checked> Mature
                                </label>

                                <label class="genre-item">
                                    <input type="checkbox" checked> Tragedy
                                </label>

                                <label class="genre-item">
                                    <input type="checkbox" checked> Magic
                                </label>

                            </div>

                        </div>

                    </div>

                    <!-- DESCRIPTION -->
                    <div class="form-group">

                        <label>Introduction:</label>

                        <textarea class="form-control" rows="5">
Amamiya Hiroto, một chàng trai không may mắn, có lẽ là người xui xẻo nhất trong số những người xui xẻo. Cuộc đời cậu là một chuỗi dài những bất hạnh, từ những sự cố nhỏ nhặt cho đến những biến cố lớn lao, mà đỉnh điểm là cái chết trong một chuyến dã ngoại mà cậu chẳng quen biết ai ngoài vài người bạn trong lớp. Cố gắng cứu một cô gái hoàn toàn xa lạ trong cơn hỗn loạn, Hiroto đã phải trả giá bằng chính mạng sống của mình.

Nhưng, thật kỳ lạ, cái chết ấy chưa phải là kết thúc của cậu.

Khi hồn lìa khỏi xác, Hiroto và hơn 100 hành khách khác trên chuyến đi đã gặp một vị thần – vị thần của vòng luân hồi. Vị thần ấy cho họ cơ hội tái sinh vào một thế giới khác, một thế giới mà họ không hề biết trước. Tuy nhiên, bất hạnh của Hiroto chưa dừng lại ở đó.

Khi cậu tái sinh, mọi thứ đều không như cậu mong đợi. Hiroto không được sinh ra trong một gia đình quý tộc hay một nơi giàu có như những câu chuyện mà cậu từng nghe. Cậu chỉ được ban cho một lượng mana khổng lồ – một sức mạnh vô biên nhưng không hề có một sự chỉ dẫn nào về cách sử dụng nó. Và rồi, không lâu sau, cuộc đời thứ hai của cậu cũng kết thúc trong bi thảm, khi cậu không thể kiểm soát được sức mạnh ấy và gặp phải những kẻ thù mạnh mẽ hơn cậu tưởng tượng.

Sau cái chết đau đớn đó, Hiroto lại gặp lại vị thần luân hồi lần thứ hai. Vị thần ấy, không thể giấu nỗi sự thất vọng, thông báo rằng Hiroto sẽ được tái sinh một lần nữa. Nhưng lần này, vị thần đã đặt lên cậu một lời nguyền, với hy vọng rằng cậu sẽ không thể sống sót lâu và sẽ chết nhanh chóng hoặc tự sát.

“Không còn hy vọng cho ngươi nữa, Amamiya Hiroto” vị thần ấy nói, giọng lạnh lùng và tàn nhẫn. "Ngươi sẽ không bao giờ tìm thấy hạnh phúc, dù ở thế giới nào."

Với lời nguyền đó, Hiroto bị tái sinh vào một cơ thể mới – một Dhampir, chủng tộc mang dòng máu của cả Vampire và Dark-Elf. Cậu sở hữu sức mạnh to lớn, với khả năng dùng ma pháp Tử vong và một bể mana khổng lồ, nhưng cũng phải gánh chịu những mối nguy hiểm không kém.

Cảm thấy không thể chết theo mong muốn của vị thần, Hiroto quyết tâm sống. Cậu không chỉ phải đối mặt với cái chết từ lời nguyền, mà còn phải học cách kiểm soát sức mạnh nguy hiểm của mình, chiến đấu với những thế lực muốn tiêu diệt cậu, và trên hết, tìm một lý do để sống, một lý do để vượt qua số phận đã được an bài.
                        </textarea>

                    </div>

                    <!-- COVER IMAGE -->
                    <div class="form-group">

                        <label>Cover image:</label>

                        <div class="upload-box">

                            <img src="/src/main/webapp/resources/client/image/novel/Screenshot 2026-02-10 202954.png"
                                style="width:120px;border-radius:8px;margin-bottom:10px">

                            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>

                            <p>Change cover image</p>

                            <input type="file">

                        </div>

                    </div>

                    <!-- BUTTON -->
                    <div class="submit-box">

                        <button type="submit" class="btn-create">
                            UPDATE
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
