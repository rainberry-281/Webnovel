<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Novel Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/src/main/resources/static/admin/css/novel/novel.css">

    <link rel="stylesheet" href="/src/main/resources/static/admin/css/font.css">

    <link rel="stylesheet" href="/src/main/resources/static/admin/css/sidebar.css">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div id="sidebar"></div>


        <!-- MAIN CONTENT -->
        <div class="main-content">

            <div class="novel-card">

                <div class="novel-header">
                    Manager Novel
                </div>

                <a href="create.html" class="btn create-btn fw-bold">
                    Create Novel
                </a>

                <div class="table-wrapper">

                    <table class="table novel-table">

                        <thead>

                            <tr>
                                <th>ID</th>
                                <th>Novel Name</th>
                                <th>Author</th>
                                <th>UploaderID</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>

                        </thead>

                        <tbody>
                            <tr>
                                <td>1</td>

                                <td>Yondomewa Iyana Shi Zokusei Majutsushi</td>

                                <td>Densuke</td>

                                <td>1</td>

                                <td class="status">Published</td>

                                <td class="action">
                                    <a href="../chapter/chapter.html">
                                        <button class="btn btn-view">
                                            <i class="fa-solid fa-eye"></i>
                                        </button>
                                    </a>

                                    <a href="update.html" class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>

                                    <button class="btn btn-success btn-toggle-status">
                                        <i class="fa-solid fa-circle-check"></i>
                                    </button>

                                </td>

                            </tr>


                            <tr>

                                <td>2</td>

                                <td>Around 40 Kenja no Isekai Seikatsu Nikki</td>

                                <td>Kotobuki Yasukiyo</td>

                                <td>2</td>

                                <td class="status">Hidden</td>

                                <td class="action">

                                    <button class="btn btn-view">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>

                                    <a href="updateNovel.html" class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>

                                    <button class="btn btn-delete btn-toggle-status">
                                        <i class="fa-solid fa-circle-xmark"></i>
                                    </button>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>


                <!-- Pagination -->
                <div class="pagination-box">

                    <a class="page-btn disabled">«</a>

                    <a class="page-btn active">1</a>

                    <a class="page-btn disabled">»</a>

                </div>

            </div>

        </div>

    </div>


    <script>
        document.querySelectorAll(".btn-toggle-status").forEach(button => {
            button.addEventListener("click", function () {
                const icon = this.querySelector("i");
                if (icon.classList.contains("fa-circle-check")) {
                    icon.classList.remove("fa-circle-check");
                    icon.classList.add("fa-circle-xmark");

                    this.classList.remove("btn-success");
                    this.classList.add("btn-delete");
                } else {
                    icon.classList.remove("fa-circle-xmark");
                    icon.classList.add("fa-circle-check");

                    this.classList.remove("btn-delete");
                    this.classList.add("btn-success");

                }
            });
        });
    </script>

    <script>
        document.querySelectorAll(".btn-toggle-status").forEach(button => {
            button.addEventListener("click", function () {
                const row = this.closest("tr");
                const statusCell = row.querySelector(".status");

                if (statusCell.textContent === "Published") {
                    statusCell.textContent = "Hidden";
                    statusCell.classList.remove("status-published");
                    statusCell.classList.add("status-hidden");
                } else {
                    statusCell.textContent = "Published";
                    statusCell.classList.remove("status-hidden");
                    statusCell.classList.add("status-published");
                }
            });
        });
    </script>

    <script src="/src/main/resources/static/admin/js/sidebar.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
