<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Novel Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/admin/css/novel/novel.css}">

    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>


        <!-- MAIN CONTENT -->
        <div class="main-content">

            <div class="novel-card">

                <div class="novel-header">
                    Manager Novel
                </div>

                <div class="d-flex align-items-center gap-2 mb-3">
                    <a th:href="@{/admin/novel/create}" class="btn create-btn fw-bold mb-0">
                        Create Novel
                    </a>

                    <form th:action="@{/admin/novel}" method="get" class="d-flex ms-auto" style="max-width: 320px;">
                        <input type="text" name="keyword" class="form-control me-2" placeholder="Search novel..."
                            th:value="${keyword}">
                        <button type="submit" class="btn btn-outline-secondary">Search</button>
                    </form>
                </div>

                <div class="table-wrapper">

                    <table class="table novel-table">

                        <thead>

                            <tr>
                                <th>ID</th>
                                <th>Novel Name</th>
                                <th>Author</th>
                                <th>UploaderID</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>

                        </thead>

                        <tbody>
                            <tr th:each="novel : ${novels}">

                                <td th:text="${novel.id}"></td>

                                <td th:text="${novel.title}"></td>

                                <td th:text="${novel.author}"></td>

                                <td th:text="${novel.user?.id ?: '-'}"></td>

                                <td class="status" th:text="${novel.status ? 'Active' : 'Inactive'}"></td>

                                <td class="action">

                                    <a th:href="@{/admin/chapter/create/{novelId}(novelId=${novel.id})}"
                                        class="btn btn-view" title="Create Chapter">
                                        <i class="fa-solid fa-eye"></i>
                                    </a>

                                    <a th:href="@{/admin/novel/update/{id}(id=${novel.id})}" class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>

                                    <form th:action="@{/admin/novel/toggle-status/{id}(id=${novel.id})}" method="POST"
                                        style="display:inline;">
                                        <button type="submit"
                                            th:classappend="${novel.status} ? 'btn-success' : 'btn-delete'"
                                            class="btn btn-toggle-status">
                                            <i th:classappend="${novel.status} ? 'fa-circle-check' : 'fa-circle-xmark'"
                                                class="fa-solid"></i>
                                        </button>
                                    </form>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>


                <!-- Pagination -->
                <div class="pagination-box">
                    <ul class="pagination">
                        <li class="page-item">
                            <a th:class="${currentPage == 1} ? 'page-link disabled' : 'page-link'"
                                th:href="@{/admin/novel(page=${currentPage - 1},keyword=${keyword})}"
                                aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(1, totalPage)}" class="page-item">
                            <a th:href="@{/admin/novel(page=${i},keyword=${keyword})}"
                                th:classappend="${i == currentPage} ? 'active'" class="page-link" th:text="${i}"></a>
                        </li>
                        <li class="page-item">
                            <a th:class="${currentPage == totalPage} ? 'page-link disabled' : 'page-link'"
                                th:href="@{/admin/novel(page=${currentPage + 1},keyword=${keyword})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
