<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Update Novel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/admin/css/novel/novel.css}">

    <link rel="stylesheet" th:href="@{/admin/css/novel/update.css}">

    <link rel="stylesheet" th:href="@{/admin/css/novel/create.css}">

    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>

        <!-- MAIN -->
        <div class="main-content">
            <div class="create-user-card">
                <div class="form-header">
                    Update Novel
                </div>
                <form th:action="@{/admin/novel/update}" th:object="${newNovel}" method="post"
                    enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">
                    <div class="row">
                        <!-- NOVEL NAME -->
                        <div class="col-md-6 form-group">
                            <label>Novel name:</label>
                            <input type="text" th:field="*{title}" class="form-control">
                        </div>

                        <!-- AUTHOR -->
                        <div class="col-md-6 form-group">
                            <label>Author:</label>
                            <input type="text" th:field="*{author}" class="form-control">
                        </div>

                        <!-- STATUS -->
                        <div class="col-md-6 form-group select-role">
                            <label>Status</label>
                            <div class="select-wrapper">
                                <select class="form-control" th:field="*{progress}">
                                    <option th:each="p : ${T(com.bn.berrynovel.domain.NovelProgress).values()}"
                                        th:value="${p}" th:text="${p.displayName}">
                                    </option>
                                </select>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>

                        <!-- TYPE -->
                        <div class="col-md-6 form-group select-role">
                            <label>Type</label>
                            <div class="select-wrapper">
                                <select class="form-control" th:field="*{type}">
                                    <option th:each="t : ${T(com.bn.berrynovel.domain.NovelType).values()}"
                                        th:value="${t}" th:text="${t.displayName}">
                                    </option>
                                </select>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>

                        <!-- GENRE -->
                        <div class="form-group genre-group">
                            <label>Genre</label>
                            <div class="genre-box">
                                <label class="genre-item" th:each="genre : ${genres}">
                                    <input type="checkbox" name="genreIds" th:value="${genre.id}"
                                        th:checked="${#lists.contains(newNovel.genres, genre)}">
                                    <span th:text="${genre.name}"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- DESCRIPTION -->
                    <div class="form-group">

                        <label>Description:</label>
                        <textarea class="form-control" rows="5" th:field="*{description}"
                            placeholder="Enter novel description..."></textarea>

                    </div>

                    <!-- COVER IMAGE -->
                    <div class="form-group">
                        <label>Cover image:</label>
                        <input type="hidden" id="currentImage" th:value="*{image}" th:if="*{image}"
                            th:data-imagepath="@{/images/novel/}">
                        <div id="uploadContainer" style="width: 100%;">
                            <div class="upload-box">
                                <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>

                                <p>Upload cover image</p>

                                <input type="file" name="images" id="imageInput" accept=".png, .jpg, .jpeg">
                            </div>

                            <div id="previewContainer" style="display:none;">
                                <img id="imagePreview" src="" alt=""
                                    style="max-width: 250px; max-height: 250px; border-radius: 8px; object-fit: cover;">
                            </div>
                        </div>
                    </div>

                    <!-- BUTTON -->
                    <div class="submit-box">
                        <button type="submit" class="btn-create">
                            UPDATE
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/src/main/resources/static/admin/js/sidebar.js"></script>

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewContainer = document.getElementById('previewContainer');
        const uploadContainer = document.getElementById('uploadContainer');
        const uploadBox = document.querySelector('.upload-box');
        const currentImageElement = document.getElementById('currentImage');

        if (currentImageElement && currentImageElement.value) {
            const currentImageName = currentImageElement.value;
            const imagePath = currentImageElement.dataset.imagepath || '/images/novel/';
            imagePreview.src = imagePath + currentImageName;
            previewContainer.style.display = 'flex';

            uploadContainer.style.display = 'flex';
            uploadContainer.style.gap = '20px';
            uploadContainer.style.alignItems = 'flex-start';
            uploadBox.style.flex = '1';
            uploadBox.style.margin = '0';
            uploadBox.style.minWidth = '0';
            previewContainer.style.flex = '0 0 auto';
            previewContainer.style.display = 'flex';
            previewContainer.style.alignItems = 'center';
            previewContainer.style.justifyContent = 'center';
        }

        imageInput.addEventListener('change', function (event) {
            const file = event.target.files[0];

            if (file) {
                const reader = new FileReader();

                reader.onload = function (e) {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'block';


                    uploadContainer.style.display = 'flex';
                    uploadContainer.style.gap = '20px';
                    uploadContainer.style.alignItems = 'flex-start';
                    uploadBox.style.flex = '1';
                    uploadBox.style.margin = '0';
                    uploadBox.style.minWidth = '0';
                    previewContainer.style.flex = '0 0 auto';
                    previewContainer.style.display = 'flex';
                    previewContainer.style.alignItems = 'center';
                    previewContainer.style.justifyContent = 'center';
                };

                reader.readAsDataURL(file);
            } else {
                previewContainer.style.display = 'none';
                uploadContainer.style.display = 'block';
                uploadBox.style.flex = '';
                uploadBox.style.margin = '';
                uploadBox.style.minWidth = '';
                previewContainer.style.flex = '';
            }
        });
    </script>

</body>

</html>
