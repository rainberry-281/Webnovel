<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Novel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/admin/css/novel/novel.css}">

    <link rel="stylesheet" th:href="@{/admin/css/novel/create.css}">

    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>

        <!-- MAIN -->
        <div class="main-content">

            <div class="create-user-card">

                <div class="form-header">
                    Create Novel
                </div>

                <form th:action="@{/admin/novel/create}" th:object="${novel}" method="post"
                    enctype="multipart/form-data">

                    <div class="row">

                        <!-- NOVEL NAME -->
                        <div class="col-md-6 form-group">
                            <label>Novel name:</label>
                            <input type="text" class="form-control" th:field="*{title}">
                        </div>

                        <!-- AUTHOR -->
                        <div class="col-md-6 form-group">
                            <label>Author:</label>
                            <input type="text" class="form-control" th:field="*{author}">
                        </div>

                        <!-- STATUS -->
                        <div class="col-md-6 form-group select-role">
                            <label>Status</label>

                            <div class="select-wrapper">
                                <select class="form-control" th:field="*{progress}">
                                    <option th:each="p : ${T(com.bn.berrynovel.domain.NovelProgress).values()}"
                                        th:value="${p}" th:text="${p.displayName}">
                                    </option>
                                </select>

                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>

                        <div class="col-md-6 form-group select-role">
                            <label>Type</label>

                            <div class="select-wrapper">
                                <select class="form-control" th:field="*{type}">
                                    <option th:each="t : ${T(com.bn.berrynovel.domain.NovelType).values()}"
                                        th:value="${t}" th:text="${t.displayName}">
                                    </option>
                                </select>

                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>

                        <!-- GENRE -->
                        <div class="form-group genre-group">

                            <label>Genre</label>

                            <div class="genre-box">

                                <label class="genre-item" th:each="genre : ${genres}">
                                    <input type="checkbox" name="genreIds" th:value="${genre.id}">
                                    <span th:text="${genre.name}"></span>
                                </label>

                            </div>

                        </div>
                    </div>

                    <!-- DESCRIPTION -->
                    <div class="form-group">

                        <label>Description:</label>

                        <textarea class="form-control" rows="5" th:field="*{description}"
                            placeholder="Enter novel description..."></textarea>

                    </div>

                    <!-- COVER IMAGE -->
                    <div class="form-group">

                        <label>Cover image:</label>

                        <div class="upload-box">

                            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>

                            <p>Upload cover image</p>

                            <input type="file" name="images">

                        </div>

                    </div>

                    <!-- BUTTON -->
                    <div class="submit-box">
                        <button type="submit" class="btn-create">
                            CREATE
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <!-- <script src="/src/main/resources/static/admin/js/sidebar.js"></script> -->

</body>

</html>
