<div th:fragment="sidebar" id="sidebar" class="sidebar">
    <h4 class="logo">Novel Admin</h4>
    <ul class="menu">
        <li th:classappend="${currentUri == '/admin' or currentUri == '/admin/' ? ' active' : ''}">
            <a th:href="@{/admin}">
                <i class="fa-solid fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri, '/admin/user') ? ' active' : ''}">
            <a th:href="@{/admin/user}">
                <i class="fa-solid fa-users"></i>
                <span>User</span>
            </a>
        </li>

        <li
            th:classappend="${#strings.startsWith(currentUri, '/admin/novel') or #strings.startsWith(currentUri, '/admin/chapter') ? ' active' : ''}">
            <a th:href="@{/admin/novel}">
                <i class="fa-solid fa-book"></i>
                <span>Novel</span>
            </a>
        </li>

        <li th:classappend="${#strings.startsWith(currentUri, '/admin/genres') ? ' active' : ''}">
            <a th:href="@{/admin/genres}">
                <i class="fa-solid fa-layer-group"></i>
                <span>Genre</span>
            </a>
        </li>
    </ul>
</div>
