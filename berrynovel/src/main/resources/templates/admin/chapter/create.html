<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add Chapter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/admin/css/chapter/addchapter.css}">
    <link rel="stylesheet" th:href="@{/admin/css/chapter/listchapter.css}">
    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

    <style>
        .chapter-form .ck-editor {
            width: 85% !important;
            border: 2px solid #222 !important;
            border-radius: 10px;
            overflow: hidden;
        }

        .ck-editor__editable {
            min-height: 300px;
            width: 100%;
            font-size: 18px;
            line-height: 1.8;
        }

        .ck-editor__editable img {
            max-width: 400px !important;
            /* kích thước tối đa */
            height: auto;
            display: block;
            margin: 15px auto;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="layout">
        <!-- LEFT SIDE -->
        <div class="chapter-list">
            <div class="chapter-tree">
                <h4 class="fw-bold" th:text="${novel.title}" style="margin-bottom: 20px;"></h4>

                <a class="btn-add-volume text-decoration-none margin-bottom-20 d-flex justify-content-center align-items-center"
                    th:href="@{/admin/chapter/create/{novelId}(novelId=${novel.id})}">
                    + Add Chapter
                </a>

                <ul>
                    <li th:each="c : ${chapters}">
                        <a class="chapter-tree-link" th:href="@{/admin/chapter/update/{id}(id=${c.id})}"
                            th:text="${c.title}"></a>
                    </li>
                </ul>
            </div>

            <a th:href="@{/admin/novel}"
                class="btn-back text-decoration-none d-flex justify-content-center align-items-center">
                Back
            </a>
        </div>

        <!-- RIGHT SIDE -->
        <div class="chapter-form">
            <form th:action="@{/admin/chapter/create/{novelId}(novelId=${novel.id})}" th:object="${newChapter}"
                method="post">
                <div class="form-row">
                    <label>Chapter title</label>
                    <input type="text" th:field="*{title}" required>
                </div>

                <div class="form-row" style="align-items:flex-start;">
                    <label>Chapter content</label>
                    <textarea id="chapterContent" th:field="*{content}"></textarea>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Create Chapter</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        const csrfToken = /*[[${_csrf.token}]]*/ "";
        const csrfHeaderName = /*[[${_csrf.headerName}]]*/ "X-CSRF-TOKEN";
    </script>

    <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>

    <script>
        function MyUploadAdapter(loader) {
            this.loader = loader;
        }

        MyUploadAdapter.prototype.upload = function () {
            return this.loader.file
                .then(file => new Promise((resolve, reject) => {

                    const data = new FormData();
                    const headers = {};
                    data.append("upload", file);
                    headers[csrfHeaderName] = csrfToken;

                    fetch("/admin/chapter/upload-image", {
                        method: "POST",
                        headers: headers,
                        credentials: "same-origin",
                        body: data
                    })
                        .then(response => response.json())
                        .then(result => {
                            resolve({
                                default: result.url
                            });
                        })
                        .catch(error => reject(error));

                }));
        };

        function MyCustomUploadAdapterPlugin(editor) {
            editor.plugins.get("FileRepository").createUploadAdapter = (loader) => {
                return new MyUploadAdapter(loader);
            };
        }

        let editor;

        ClassicEditor
            .create(document.querySelector('#chapterContent'), {
                extraPlugins: [MyCustomUploadAdapterPlugin]
            })
            .then(newEditor => {
                editor = newEditor;
            })
            .catch(error => {
                console.error(error);
            });

        // sync dữ liệu trước khi submit form
        document.querySelector("form").addEventListener("submit", function () {
            document.querySelector("#chapterContent").value = editor.getData();
        });
    </script>
</body>

</html>
