<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Update User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/admin/css/user/manageuser.css}">

    <link rel="stylesheet" th:href="@{/admin/css/user/createuser.css}">

    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">

</head>

<body>

    <div class="layout">

        <div th:replace="admin/layout/sidebar :: sidebar"></div>


        <!-- MAIN -->
        <div class="main-content">
            <div class="create-user-card">
                <div class="form-header">
                    Update User
                </div>
                <form th:action="@{/admin/user/update/{id}(id=${user.id})}" th:object="${user}" method="post"
                    enctype="multipart/form-data">
                    <div class="row">
                        <input type="hidden" th:field="*{id}">
                        <!-- EMAIL -->
                        <div class="col-md-12 form-group">
                            <label>Email:</label>
                            <input th:type="email" class="form-control border bg-light" th:field="*{email}" readonly>
                        </div>

                        <!-- USERNAME -->
                        <div class="col-md-6 form-group">
                            <label>User name:</label>
                            <input th:type="text" class="form-control border bg-light" th:field="*{username}"
                                readonly="true">
                        </div>

                        <!-- FULLNAME -->
                        <div class="col-md-6 form-group">
                            <label>Full name:</label>
                            <input th:type="text" class="form-control" th:field="*{fullName}">
                        </div>

                        <!-- PHONE -->
                        <div class="col-md-6 form-group">
                            <label>Phone number:</label>
                            <input th:type="text" class="form-control" th:field="*{phoneNumber}">
                        </div>

                        <!-- ROLE -->
                        <div class="col-md-6 form-group select-role">
                            <label>Select role</label>
                            <div class="select-wrapper">
                                <select class="form-control" th:field="*{role.name}">
                                    <option value="USER">USER</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>
                    </div>

                    <!-- AVATAR -->

                    <div class="form-group">
                        <label>Avatar:</label>
                        <div class="upload-box">
                            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                            <p>Upload image</p>
                            <input type="file" name="image">
                        </div>
                    </div>


                    <!-- BUTTON -->

                    <div class="submit-box">

                        <button type="submit" class="btn-create">
                            UPDATE
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- <script src="/src/main/resources/static/admin/js/sidebar.js"></script> -->

</body>

</html>
