<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Update User</title>

    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">

    <link rel="stylesheet" th:href="@{/admin/css/user/manageuser.css}">

    <link rel="stylesheet" th:href="@{/admin/css/user/createuser.css}">

    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">

</head>

<body>

    <div class="layout">

        <div th:replace="admin/layout/sidebar :: sidebar"></div>


        <!-- MAIN -->
        <div class="main-content">
            <div class="create-user-card">
                <div class="form-header">
                    Update User
                </div>
                <form th:action="@{/admin/user/update/{id}(id=${newUser.id})}" th:object="${newUser}" method="post"
                    enctype="multipart/form-data">
                    <div class="row">
                        <input type="hidden" th:field="*{id}">
                        <!-- EMAIL -->
                        <div class="col-md-12 form-group">
                            <label>Email:</label>
                            <input th:type="email" class="form-control border bg-light" th:field="*{email}" readonly>
                            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                            </div>
                        </div>

                        <!-- USERNAME -->
                        <div class="col-md-6 form-group">
                            <label>User name:</label>
                            <input th:type="text" class="form-control border bg-light" th:field="*{username}"
                                readonly="true">
                            <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                            </div>
                        </div>

                        <!-- FULLNAME -->
                        <div class="col-md-6 form-group">
                            <label>Full name:</label>
                            <input th:type="text" class="form-control" th:field="*{fullName}">
                        </div>

                        <!-- PHONE -->
                        <div class="col-md-6 form-group">
                            <label>Phone number:</label>
                            <input th:type="text" class="form-control" th:field="*{phoneNumber}">
                            <div class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}"
                                th:errors="*{phoneNumber}">
                            </div>
                        </div>

                        <!-- ROLE -->
                        <div class="col-md-6 form-group select-role">
                            <label>Select role</label>
                            <div class="select-wrapper">
                                <select class="form-control" th:field="*{role.name}">
                                    <option value="USER">USER</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>
                    </div>

                    <!-- AVATAR -->

                    <div class="form-group">
                        <label>Avatar:</label>
                        <input type="hidden" id="currentImage" th:value="*{image}" th:if="*{image}"
                            th:data-imagepath="@{/images/avatar/}">
                        <div id="uploadContainer" style="width: 100%;">
                            <div class="upload-box">
                                <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                                <p>Upload image</p>
                                <input type="file" name="images" id="imageInput" accept=".png, .jpg, .jpeg">
                            </div>

                            <div id="previewContainer" style="display:none;">
                                <img id="imagePreview" src="" alt=""
                                    style="max-width: 250px; max-height: 250px; border-radius: 8px; object-fit: cover;">
                            </div>
                        </div>
                    </div>


                    <!-- BUTTON -->

                    <div class="submit-box">

                        <button type="submit" class="btn-create">
                            UPDATE
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- <script src="/src/main/resources/static/admin/js/sidebar.js"></script> -->

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewContainer = document.getElementById('previewContainer');
        const uploadContainer = document.getElementById('uploadContainer');
        const uploadBox = document.querySelector('.upload-box');
        const currentImageElement = document.getElementById('currentImage');

        // Check if there's a current image on page load
        if (currentImageElement && currentImageElement.value) {
            const currentImageName = currentImageElement.value;
            const imagePath = currentImageElement.dataset.imagepath || '/images/avatar/';
            imagePreview.src = imagePath + currentImageName;
            previewContainer.style.display = 'flex';

            // Set up flex layout
            uploadContainer.style.display = 'flex';
            uploadContainer.style.gap = '20px';
            uploadContainer.style.alignItems = 'flex-start';
            uploadBox.style.flex = '1';
            uploadBox.style.margin = '0';
            uploadBox.style.minWidth = '0';
            previewContainer.style.flex = '0 0 auto';
            previewContainer.style.display = 'flex';
            previewContainer.style.alignItems = 'center';
            previewContainer.style.justifyContent = 'center';
        }

        imageInput.addEventListener('change', function (event) {
            const file = event.target.files[0];

            if (file) {
                const reader = new FileReader();

                reader.onload = function (e) {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'block';

                    // Change layout to flex when image is selected
                    uploadContainer.style.display = 'flex';
                    uploadContainer.style.gap = '20px';
                    uploadContainer.style.alignItems = 'flex-start';
                    uploadBox.style.flex = '1';
                    uploadBox.style.margin = '0';
                    uploadBox.style.minWidth = '0';
                    previewContainer.style.flex = '0 0 auto';
                    previewContainer.style.display = 'flex';
                    previewContainer.style.alignItems = 'center';
                    previewContainer.style.justifyContent = 'center';
                };

                reader.readAsDataURL(file);
            } else {
                previewContainer.style.display = 'none';
                // Reset to full width when file is removed
                uploadContainer.style.display = 'block';
                uploadBox.style.flex = '';
                uploadBox.style.margin = '';
                uploadBox.style.minWidth = '';
                previewContainer.style.flex = '';
            }
        });
    </script>

</body>

</html>
