<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/src/main/resources/static/admin/css/user/manageuser.css">

    <link rel="stylesheet" href="/src/main/resources/static/admin/css/user/createuser.css">

    <link rel="stylesheet" href="/src/main/resources/static/admin/css/font.css">

    <link rel="stylesheet" href="/src/main/resources/static/admin/css/sidebar.css">

</head>

<body>

    <div class="layout">

        <div id="sidebar"></div>


        <!-- MAIN -->
        <div class="main-content">
            <div class="create-user-card">
                <div class="form-header">
                    Update User
                </div>
                <form>
                    <div class="row">

                        <!-- EMAIL -->
                        <div class="col-md-12 form-group">
                            <label>Email:</label>
                            <input type="email" class="form-control border bg-light" value="nguyennhatanh533@gmail.com"
                                readonly>
                        </div>

                        <!-- USERNAME -->
                        <div class="col-md-6 form-group">
                            <label>User name:</label>
                            <input type="text" class="form-control border bg-light" value="rainberry" readonly="true">
                        </div>

                        <!-- FULLNAME -->
                        <div class="col-md-6 form-group">
                            <label>Full name:</label>
                            <input type="text" class="form-control" value="Nguyen Nhat Anh">
                        </div>

                        <!-- PHONE -->
                        <div class="col-md-6 form-group">
                            <label>Phone number:</label>
                            <input type="text" class="form-control" value="0796560405">
                        </div>

                        <!-- ROLE -->
                        <div class="col-md-6 form-group select-role">
                            <label>Select role</label>
                            <div class="select-wrapper">
                                <select class="form-control">
                                    <option>USER</option>
                                    <option selected>ADMIN</option>
                                </select>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>
                    </div>

                    <!-- AVATAR -->

                    <div class="form-group">
                        <label>Avatar:</label>
                        <div class="upload-box">
                            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                            <p>Upload image</p>
                            <input type="file">
                        </div>
                    </div>


                    <!-- BUTTON -->

                    <div class="submit-box">

                        <button type="submit" class="btn-create">
                            UPDATE
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/src/main/resources/static/admin/js/sidebar.js"></script>

</body>

</html>
