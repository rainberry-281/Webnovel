<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <link rel="stylesheet" th:href="@{/admin/css/user/manageuser.css}">

    <link rel="stylesheet" th:href="@{/admin/css/user/createuser.css}">

    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
</head>

<body>

    <div class="layout">

        <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>


        <!-- MAIN -->
        <div class="main-content">

            <div class="create-user-card">

                <div class="form-header">
                    Create User
                </div>

                <form th:action="@{/admin/user/create}" th:object="${newUser}" method="post"
                    enctype="multipart/form-data">

                    <div class="row">

                        <!-- EMAIL -->
                        <div class="col-md-6 form-group">
                            <label>Email:</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="Enter email">
                            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                            </div>
                        </div>
                        <!-- USERNAME -->
                        <div class="col-md-6 form-group">
                            <label>User name:</label>
                            <input type="text" class="form-control" th:field="*{username}"
                                placeholder="Enter user name">
                            <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                            </div>
                        </div>

                        <!-- PASSWORD -->
                        <div class="col-md-6 form-group">
                            <label>Password:</label>
                            <input type="password" class="form-control" th:field="*{password}"
                                placeholder="Enter password">
                            <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                            </div>
                        </div>

                        <!-- FULLNAME -->
                        <div class="col-md-6 form-group">
                            <label>Full name:</label>
                            <input type="text" class="form-control" th:field="*{fullName}"
                                placeholder="Enter full name">
                        </div>

                        <!-- PHONE -->
                        <div class="col-md-6 form-group">
                            <label>Phone number:</label>
                            <input type="text" class="form-control" th:field="*{phoneNumber}"
                                placeholder="Enter phone number">
                        </div>

                        <!-- ROLE -->
                        <div class="col-md-6 form-group select-role">
                            <label>Select role</label>

                            <div class="select-wrapper">
                                <select class="form-control" th:field="*{role.name}">
                                    <option value="">Select role</option>
                                    <option value="ADMIN">ADMIN</option>
                                    <option value="USER">USER</option>
                                </select>
                                <div class="text-danger" th:if="${#fields.hasErrors('role.name')}"
                                    th:errors="*{role.name}">
                                </div>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>

                        <!-- AVATAR -->
                        <div class="form-group">

                            <label>Avatar:</label>

                            <div class="upload-box">

                                <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>

                                <p>Upload image</p>

                                <input type="file" name="images">

                            </div>

                        </div>


                        <!-- BUTTON -->

                        <div class="submit-box">
                            <button type="submit" class="btn-create">
                                CREATE
                            </button>
                        </div>

                </form>

            </div>

        </div>

    </div>

    <!-- <script th:src="@{/admin/js/sidebar.js}"></script> -->

</body>

</html>
