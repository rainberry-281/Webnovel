<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <link rel="stylesheet" th:href="@{/admin/css/user/manageuser.css}">

    <link rel="stylesheet" th:href="@{/admin/css/user/createuser.css}">

    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
</head>

<body>

    <div class="layout">

        <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>


        <!-- MAIN -->
        <div class="main-content">

            <div class="create-user-card">

                <div class="form-header">
                    Create User
                </div>

                <form th:action="@{/admin/user/create}" th:object="${newUser}" method="post"
                    enctype="multipart/form-data">

                    <div class="row">

                        <!-- EMAIL -->
                        <div class="col-md-6 form-group">
                            <label>Email:</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="Enter email">
                            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                            </div>
                        </div>
                        <!-- USERNAME -->
                        <div class="col-md-6 form-group">
                            <label>User name:</label>
                            <input type="text" class="form-control" th:field="*{username}"
                                placeholder="Enter user name">
                            <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                            </div>
                        </div>

                        <!-- PASSWORD -->
                        <div class="col-md-6 form-group">
                            <label>Password:</label>
                            <input type="password" class="form-control" th:field="*{password}"
                                placeholder="Enter password">
                            <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                            </div>
                        </div>

                        <!-- FULLNAME -->
                        <div class="col-md-6 form-group">
                            <label>Full name:</label>
                            <input type="text" class="form-control" th:field="*{fullName}"
                                placeholder="Enter full name">
                        </div>

                        <!-- PHONE -->
                        <div class="col-md-6 form-group">
                            <label>Phone number:</label>
                            <input type="text" class="form-control" th:field="*{phoneNumber}"
                                placeholder="Enter phone number">
                            <div class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}"
                                th:errors="*{phoneNumber}">
                            </div>
                        </div>

                        <!-- ROLE -->
                        <div class="col-md-6 form-group select-role">
                            <label>Select role</label>

                            <div class="select-wrapper">
                                <select class="form-control" th:field="*{role.name}">
                                    <option value="USER">USER</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                                <div class="text-danger" th:if="${#fields.hasErrors('role.name')}"
                                    th:errors="*{role.name}">
                                </div>
                                <i class="fa-solid fa-chevron-down"></i>
                            </div>
                        </div>

                        <!-- AVATAR -->
                        <div class="form-group">

                            <label>Avatar:</label>

                            <div id="uploadContainer" style="width: 100%;">

                                <div class="upload-box">

                                    <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>

                                    <p>Upload image</p>

                                    <input type="file" name="images" id="imageInput" accept=".png, .jpg, .jpeg">

                                </div>

                                <div id="previewContainer" style="display:none;">
                                    <img id="imagePreview" src="" alt=""
                                        style="max-width: 250px; max-height: 250px; border-radius: 8px; object-fit: cover;">
                                </div>

                            </div>

                        </div>


                        <!-- BUTTON -->

                        <div class="submit-box">
                            <button type="submit" class="btn-create">
                                CREATE
                            </button>
                        </div>
                    </div>
                </form>

            </div>

        </div>

    </div>

    <!-- <script th:src="@{/admin/js/sidebar.js}"></script> -->

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewContainer = document.getElementById('previewContainer');
        const uploadContainer = document.getElementById('uploadContainer');
        const uploadBox = document.querySelector('.upload-box');

        imageInput.addEventListener('change', function (event) {
            const file = event.target.files[0];

            if (file) {
                const reader = new FileReader();

                reader.onload = function (e) {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'block';

                    // Change layout to flex when image is selected
                    uploadContainer.style.display = 'flex';
                    uploadContainer.style.gap = '20px';
                    uploadContainer.style.alignItems = 'flex-start';
                    uploadBox.style.flex = '1';
                    uploadBox.style.margin = '0';
                    previewContainer.style.flex = '0 0 auto';
                    previewContainer.style.display = 'flex';
                    previewContainer.style.alignItems = 'center';
                    previewContainer.style.justifyContent = 'center';
                };

                reader.readAsDataURL(file);
            } else {
                previewContainer.style.display = 'none';
                // Reset to full width when file is removed
                uploadContainer.style.display = 'block';
                uploadBox.style.flex = '';
                uploadBox.style.margin = '';
                previewContainer.style.flex = '';
            }
        });
    </script>

</body>

</html>
