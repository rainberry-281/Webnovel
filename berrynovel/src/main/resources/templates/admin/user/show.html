<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>User Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/admin/css/user/manageuser.css}">

    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>


        <!-- MAIN -->
        <div class="main-content">
            <div class="user-card">
                <div class="user-header">
                    Manager User
                </div>

                <div class="d-flex align-items-center gap-2 mb-3">
                    <a th:href="@{/admin/user/create}" class="btn create-btn fw-bold mb-0">
                        Create User
                    </a>

                    <form th:action="@{/admin/user}" method="get" class="d-flex ms-auto" style="max-width: 320px;">
                        <input type="text" name="keyword" class="form-control me-2" placeholder="Search user..."
                            th:value="${keyword}">
                        <button type="submit" class="btn btn-outline-secondary">Search</button>
                    </form>
                </div>
                <div class="table-wrapper">
                    <table class="table user-table">

                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>

                                <td th:text="${user.username}"></td>

                                <td th:text="${user.email}"></td>

                                <td th:text="${user.phoneNumber}"></td>

                                <td class="status" th:text="${user.status ? 'Active' : 'Inactive'}"
                                    th:classappend="${user.status} ? 'status-active' : 'status-inactive'">
                                </td>

                                <td class="action">

                                    <button class="btn btn-view" data-bs-toggle="modal"
                                        data-bs-target="#userDetailModal" th:data-id="${user.id}"
                                        th:data-name="${user.fullName}" th:data-username="${user.username}"
                                        th:data-email="${user.email}" th:data-phone="${user.phoneNumber}"
                                        th:data-role="${user.role.name}" th:data-avatar="${user.image}"
                                        th:data-status="${user.status}">
                                        <i class="fa-solid fa-id-card"></i>
                                    </button>

                                    <a th:href="@{/admin/user/update/{id}(id=${user.id})}" class="btn btn-edit">
                                        <i class="fa-solid fa-user-pen"></i>
                                    </a>

                                    <form th:action="@{/admin/user/ban/{id}(id=${user.id})}" method="POST"
                                        style="display:inline;">
                                        <button type="submit"
                                            th:classappend="${user.status} ? 'btn-success' : 'btn-delete'"
                                            class="btn btn-toggle-lock">
                                            <i th:classappend="${user.status} ? 'fa-lock-open' : 'fa-lock'"
                                                class="fa-solid"></i>
                                        </button>
                                    </form>

                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>


                <!-- Pagination -->

                <div class="pagination-box">
                    <ul class="pagination">
                        <li class="page-item">
                            <a th:class="${currentPage == 1} ? 'page-link disabled' : 'page-link'"
                                th:href="@{/admin/user(page=${currentPage - 1},keyword=${keyword})}"
                                aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(1, totalPage)}" class="page-item">
                            <a th:href="@{/admin/user(page=${i},keyword=${keyword})}"
                                th:classappend="${i == currentPage} ? 'active'" class="page-link" th:text="${i}"></a>
                        </li>
                        <li class="page-item">
                            <a th:class="${currentPage == totalPage} ? 'page-link disabled' : 'page-link'"
                                th:href="@{/admin/user(page=${currentPage + 1},keyword=${keyword})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="userDetailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">User Information</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body user-modal-body">

                    <h4 class="user-name"></h4>

                    <div class="avatar-box">
                        <img id="userAvatar" th:src="${user} ? @{'/images/avatar/' + ${user.image}} : ''"
                            alt="User Avatar" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
                        <p class="user-id"></p>
                        <span class="role-badge">USER</span>
                    </div>

                    <div class="info-box">

                        <h6 class="info-title">
                            <i class="fa-solid fa-circle-info"></i> Account Information
                        </h6>

                        <div class="info-grid">

                            <div class="info-item">
                                <i class="fa-solid fa-user"></i>
                                <div>
                                    <span class="label">Username:</span>
                                    <p class="user-username"></p>
                                </div>
                            </div>

                            <div class="info-item">
                                <i class="fa-solid fa-envelope"></i>
                                <div>
                                    <span class="label">Email:</span>
                                    <p class="user-email"></p>
                                </div>
                            </div>

                            <div class="info-item">
                                <i class="fa-solid fa-phone"></i>
                                <div>
                                    <span class="label">Phone:</span>
                                    <p class="user-phone"></p>
                                </div>
                            </div>

                            <div class="info-item">
                                <i class="fa-solid fa-circle-check"></i>
                                <div>
                                    <span class="label">Status:</span>
                                    <p class="status user-status">Active</p>
                                </div>
                            </div>

                        </div>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll(".btn-view").forEach(btn => {
            btn.addEventListener("click", function () {
                // Populate modal with user data from database
                const userName = this.dataset.name || "N/A";
                const userId = this.dataset.id;
                const username = this.dataset.username || "N/A";
                const email = this.dataset.email || "N/A";
                const phone = this.dataset.phone || "N/A";
                const role = this.dataset.role || "USER";
                const avatar = this.dataset.avatar;
                const status = this.dataset.status === 'true' ? 'Active' : 'Inactive';

                // Update modal content
                document.querySelector(".user-name").textContent = userName;
                document.querySelector(".user-id").textContent = "ID: " + userId;
                document.querySelector(".user-username").textContent = "@" + username;
                document.querySelector(".user-email").textContent = email;
                document.querySelector(".user-phone").textContent = phone;
                document.querySelector(".user-status").textContent = status;
                document.querySelector(".role-badge").textContent = role;

                // Set avatar image
                if (avatar) {
                    document.getElementById("userAvatar").src = "/images/avatar/" + avatar;
                } else {
                    document.getElementById("userAvatar").src = "/images/avatar/default-avatar.png";
                }
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- <script th:src="@{/admin/js/sidebar.js}"></script> -->

</body>

</html>
