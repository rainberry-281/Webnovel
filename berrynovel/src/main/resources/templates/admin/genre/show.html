<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Genre Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/admin/css/genre/genre.css}">

    <link rel="stylesheet" th:href="@{/admin/css/sidebar.css}">

    <link rel="stylesheet" th:href="@{/admin/css/font.css}">

</head>

<body>

    <div class="layout">
        <!-- SIDEBAR -->
        <div th:replace="~{admin/layout/sidebar :: sidebar}"></div>


        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="genre-card">
                <div class="genre-header">
                    Manager Genre
                </div>

                <button class="btn create-btn fw-bold" onclick="openPopup()">Add Genre</button>

                <div class="table-wrapper">
                    <table class="table genre-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="genre : ${genres}">
                                <td th:text="${genre.id}">1</td>
                                <td th:text="${genre.name}">Action</td>

                                <td th:classappend="${genre.status} ? 'status-published' : 'status-hidden'"
                                    class="status">
                                    <span th:text="${genre.status} ? 'Active' : 'InActive'"></span>
                                </td>

                                <td class="action">
                                    <button class="btn btn-edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>

                                    <form th:action="@{/admin/genres/genre/action/{id}(id=${genre.id})}" method="POST"
                                        style="display:inline;">
                                        <button type="submit"
                                            th:classappend="${genre.status} ? 'btn-success' : 'btn-delete'"
                                            class="btn btn-toggle-status">
                                            <i th:classappend="${genre.status} ? 'fa-circle-check' : 'fa-circle-xmark'"
                                                class="fa-solid"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-box">
                    <ul class="pagination">
                        <li class="page-item">
                            <a th:class="${currentPage == 1} ? 'page-link disabled' : 'page-link'"
                                th:href="@{/admin/genres(page=${currentPage - 1})}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(1, totalPage)}" class="page-item">
                            <a th:href="@{/admin/genres(page=${i})}" th:classappend="${i == currentPage} ? 'active'"
                                class="page-link" th:text="${i}"></a>
                        </li>
                        <li class="page-item">
                            <a th:class="${currentPage == totalPage} ? 'page-link disabled' : 'page-link'"
                                th:href="@{/admin/genres(page=${currentPage + 1})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- POPUP ADD GENRE -->
    <div class="popup-overlay" id="genrePopup">
        <div class="popup-box">

            <div class="popup-header">
                <h2 class="fw-semibold" id="popupTitle">Add New Genre</h2>
                <span class="close-btn" onclick="closePopup()">×</span>
            </div>

            <form th:action="@{/admin/genres/genre/create}" th:object="${genre}" method="POST" id="genreForm">
                <div class="popup-body">

                    <!-- hidden id dùng cho edit -->
                    <input type="hidden" th:field="*{id}" id="genreId">

                    <label for="genreName">Genre Name</label>
                    <input type="text" th:field="*{name}" id="genreName" placeholder="Enter genre name" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    <input type="hidden" name="status" value="true">

                    <div class="popup-action">
                        <button type="submit" class="create-btn" id="saveGenreBtn">CREATE</button>
                        <button type="button" class="btn btn-secondary" onclick="closePopup()">Cancel</button>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <input type="hidden" id="openGenrePopupFlag" th:value="${openGenrePopup}">
    <input type="hidden" id="popupModeValue" th:value="${popupMode}">
    <input type="hidden" id="popupGenreIdValue" th:value="${genre != null ? genre.id : 0}">



    <script>
        document.querySelectorAll(".action button:last-child").forEach(button => {
            button.addEventListener("click", function () {
                const row = this.closest("tr");
                const statusCell = row.querySelector(".status");
                const icon = this.querySelector("i");

                if (statusCell.textContent.trim() === "Active") {
                    statusCell.textContent = "InActive";
                    statusCell.classList.remove("status-published");
                    statusCell.classList.add("status-hidden");

                    icon.classList.remove("fa-circle-check");
                    icon.classList.add("fa-circle-xmark");

                    this.classList.remove("btn-success");
                    this.classList.add("btn-delete");
                } else {
                    statusCell.textContent = "Active";
                    statusCell.classList.remove("status-hidden");
                    statusCell.classList.add("status-published");

                    icon.classList.remove("fa-circle-xmark");
                    icon.classList.add("fa-circle-check");

                    this.classList.remove("btn-delete");
                    this.classList.add("btn-success");
                }
            });
        });
    </script>

    <script>
        function openPopup() {
            document.getElementById("popupTitle").innerText = "Add New Genre";
            document.getElementById("genreForm").action = "/admin/genres/genre/create";
            document.getElementById("genreId").value = "";
            document.getElementById("genreName").value = "";
            document.getElementById("saveGenreBtn").innerText = "CREATE";
            document.getElementById("genrePopup").style.display = "flex";
        }
    </script>

    <script>
        document.querySelectorAll(".btn-edit").forEach(btn => {
            btn.addEventListener("click", function () {
                const row = this.closest("tr");
                const id = row.children[0].innerText;
                const name = row.children[1].innerText;
                const status = row.querySelector(".status").textContent.trim() === "Active";

                document.getElementById("popupTitle").innerText = "Edit Genre";
                document.getElementById("genreForm").action = "/admin/genres/genre/update/" + id;
                document.getElementById("genreId").value = id;
                document.getElementById("genreName").value = name;
                document.getElementById("saveGenreBtn").innerText = "UPDATE";
                document.getElementById("genrePopup").style.display = "flex";
            });
        });
    </script>

    <script>
        function closePopup() {
            document.getElementById("genrePopup").style.display = "none";
        }
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const openGenrePopup = document.getElementById("openGenrePopupFlag")?.value === "true";
            if (!openGenrePopup) {
                return;
            }

            const popupMode = document.getElementById("popupModeValue")?.value || "";
            const genreId = Number(document.getElementById("popupGenreIdValue")?.value || 0);

            if (popupMode === "update" && genreId > 0) {
                document.getElementById("popupTitle").innerText = "Edit Genre";
                document.getElementById("genreForm").action = "/admin/genres/genre/update/" + genreId;
                document.getElementById("saveGenreBtn").innerText = "UPDATE";
            } else {
                document.getElementById("popupTitle").innerText = "Add New Genre";
                document.getElementById("genreForm").action = "/admin/genres/genre/create";
                document.getElementById("saveGenreBtn").innerText = "CREATE";
            }

            document.getElementById("genrePopup").style.display = "flex";
        });
    </script>

    <script src="/src/main/resources/static/admin/js/sidebar.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
