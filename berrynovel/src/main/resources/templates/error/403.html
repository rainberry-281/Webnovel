<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>403 - berryNovel</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/client/css/navitigation.css}">
    <link rel="stylesheet" th:href="@{/client/css/font.css}">
    <style>
        body {
            min-height: 100vh;
            color: #333;
            background: linear-gradient(135deg, #f6e1c3, #e9c9a8);
        }

        .error-page {
            min-height: calc(100vh - 72px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 96px 16px 40px;
        }

        .error-panel {
            width: min(560px, 100%);
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.12);
            padding: 32px;
            text-align: center;
        }

        .error-code {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 12px;
        }

        .error-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .error-text {
            color: #666;
            margin-bottom: 24px;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div th:replace="~{client/layout/navigation :: navbar}"></div>

    <main class="error-page">
        <section class="error-panel">
            <div class="error-code">403</div>
            <div class="error-title">Admin access required</div>
            <p class="error-text">
                Your account does not have permission to open this admin page.
            </p>

            <div class="error-actions">
                <a th:href="@{/home}" class="btn btn-danger px-4">
                    Back to home
                </a>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-secondary px-4">
                        Sign in with another account
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
