<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>berryNovel - Thế giới truyện chữ</title>

    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">

    <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">

    <link rel="stylesheet" th:href="@{/client/css/category.css}">

    <link rel="stylesheet" th:href="@{/client/css/navitigation.css}">

    <link rel="stylesheet" th:href="@{/client/css/font.css}">

    <style>
        .card-img-top {
            aspect-ratio: 2 / 3;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <!-- navbar -->
    <div th:replace="~{client/layout/navigation :: navbar}"></div>

    <div class="page-wrapper" style="padding-top: 78px;">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a th:href="@{/}" class="text-decoration-none text-dark">Home</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page"
                        th:text="${hasFilters} ? 'Filter result' : 'Category'">Category</li>
                </ol>
            </nav>

            <div class="row d-block clearfix">
                <!-- Filter sidebar -->
                <div class="col-12 col-lg-2 d-block filter-box float-start">
                    <form th:action="${#strings.isEmpty(keyword)} ? @{/category} : @{/search}" method="get">
                        <input type="hidden" name="keyword" th:if="${!#strings.isEmpty(keyword)}" th:value="${keyword}">

                        <h6>Source</h6>
                        <div>
                            <label>
                                <input type="checkbox" name="types" value="ORIGINAL"
                                    th:checked="${selectedTypes != null and #lists.contains(selectedTypes, 'ORIGINAL')}">
                                Original
                            </label>
                        </div>
                        <div>
                            <label>
                                <input type="checkbox" name="types" value="TRANSLATION"
                                    th:checked="${selectedTypes != null and #lists.contains(selectedTypes, 'TRANSLATION')}">
                                Translation
                            </label>
                        </div>

                        <hr>

                        <h6>Progress</h6>
                        <div>
                            <label>
                                <input type="checkbox" name="progresses" value="ONGOING"
                                    th:checked="${selectedProgresses != null and #lists.contains(selectedProgresses, 'ONGOING')}">
                                Ongoing
                            </label>
                        </div>
                        <div>
                            <label>
                                <input type="checkbox" name="progresses" value="PAUSED"
                                    th:checked="${selectedProgresses != null and #lists.contains(selectedProgresses, 'PAUSED')}">
                                Paused
                            </label>
                        </div>
                        <div>
                            <label>
                                <input type="checkbox" name="progresses" value="COMPLETED"
                                    th:checked="${selectedProgresses != null and #lists.contains(selectedProgresses, 'COMPLETED')}">
                                Completed
                            </label>
                        </div>

                        <hr>

                        <h6>Genres</h6>
                        <div th:classappend="${#lists.size(genres) > 10} ? 'genre-scroll'"
                            th:style="${#lists.size(genres) > 10} ? 'max-height:280px; overflow-y:auto; padding-right:6px;' : ''">
                            <div th:each="genre : ${genres}">
                                <label>
                                    <input type="checkbox" name="genres" th:value="${genre.id}"
                                        th:checked="${selectedGenres != null and #lists.contains(selectedGenres, genre.id)}">
                                    <span th:text="${genre.name}"></span>
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-dark btn-sm">Filter</button>
                            <a class="btn btn-outline-secondary btn-sm"
                                th:href="${#strings.isEmpty(keyword)} ? @{/category} : @{/search(keyword=${keyword})}">
                                Clear
                            </a>
                        </div>
                    </form>
                </div>

                <!-- Novel list -->
                <div class="col-12 col-lg-9 float-end">
                    <h2 class="fw-bold mb-4" th:text="${hasFilters} ? 'Filter result' : 'All novels'">
                    </h2>

                    <p class="text-muted mb-4 fs-4" th:if="${#lists.isEmpty(novels)}">
                        No novels found matching your search.
                    </p>

                    <div class="novel-list row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4">
                        <a th:each="novel : ${novels}" th:href="@{/novel/{id}(id=${novel.id},from='category')}"
                            class="">
                            <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 15px;">
                                <img th:src="@{'/images/novel/' + ${novel.image}}" class="card-img-top"
                                    th:alt="${novel.title}">
                                <div class="overlay">
                                    <h6 class="mb-1 fw-bold text-white text-truncate" th:text="${novel.title}"></h6>
                                    <small class="text-light" th:text="'Tác giả: ' + ${novel.author}"></small>
                                </div>
                            </div>
                        </a>
                    </div>

                    <div class="d-flex justify-content-center mt-4"
                        th:if="${#strings.isEmpty(keyword) and totalPage > 1}">
                        <ul class="pagination">
                            <li class="page-item">
                                <a th:class="${currentPage == 1} ? 'page-link disabled' : 'page-link'"
                                    th:href="@{/category(page=${currentPage - 1},genres=${selectedGenres},types=${selectedTypes},progresses=${selectedProgresses})}"
                                    aria-label="Previous">
                                    <span aria-hidden="true">&laquo;</span>
                                </a>
                            </li>

                            <li th:each="i : ${#numbers.sequence(1, totalPage)}" class="page-item">
                                <a th:href="@{/category(page=${i},genres=${selectedGenres},types=${selectedTypes},progresses=${selectedProgresses})}"
                                    th:classappend="${i == currentPage} ? 'active'" class="page-link"
                                    th:text="${i}"></a>
                            </li>

                            <li class="page-item">
                                <a th:class="${currentPage == totalPage} ? 'page-link disabled' : 'page-link'"
                                    th:href="@{/category(page=${currentPage + 1},genres=${selectedGenres},types=${selectedTypes},progresses=${selectedProgresses})}"
                                    aria-label="Next">
                                    <span aria-hidden="true">&raquo;</span>
                                </a>
                            </li>
                        </ul>
                    </div>

                    <div class="d-flex justify-content-center mt-4"
                        th:if="${!#strings.isEmpty(keyword) and totalPage > 1}">
                        <ul class="pagination">
                            <li class="page-item">
                                <a th:class="${currentPage == 1} ? 'page-link disabled' : 'page-link'"
                                    th:href="@{/search(keyword=${keyword},genres=${selectedGenres},types=${selectedTypes},progresses=${selectedProgresses},page=${currentPage - 1})}"
                                    aria-label="Previous">
                                    <span aria-hidden="true">&laquo;</span>
                                </a>
                            </li>

                            <li th:each="i : ${#numbers.sequence(1, totalPage)}" class="page-item">
                                <a th:href="@{/search(keyword=${keyword},genres=${selectedGenres},types=${selectedTypes},progresses=${selectedProgresses},page=${i})}"
                                    th:classappend="${i == currentPage} ? 'active'" class="page-link"
                                    th:text="${i}"></a>
                            </li>

                            <li class="page-item">
                                <a th:class="${currentPage == totalPage} ? 'page-link disabled' : 'page-link'"
                                    th:href="@{/search(keyword=${keyword},genres=${selectedGenres},types=${selectedTypes},progresses=${selectedProgresses},page=${currentPage + 1})}"
                                    aria-label="Next">
                                    <span aria-hidden="true">&raquo;</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center py-4">
        <h4>© 2026 berryNovel</h4>
    </footer>

    <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>

    <script th:src="@{/client/js/navitigation.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const typeInputs = document.querySelectorAll('input[name="types"]');
            const progressInputs = document.querySelectorAll('input[name="progresses"]');
            typeInputs.forEach(function (input) {
                input.addEventListener('change', function () {
                    if (!this.checked) {
                        return;
                    }
                    typeInputs.forEach(function (other) {
                        if (other !== input) {
                            other.checked = false;
                        }
                    });
                });
            });

            progressInputs.forEach(function (input) {
                input.addEventListener('change', function () {
                    if (!this.checked) {
                        return;
                    }
                    progressInputs.forEach(function (other) {
                        if (other !== input) {
                            other.checked = false;
                        }
                    });
                });
            });
        });
    </script>
</body>

</html>
