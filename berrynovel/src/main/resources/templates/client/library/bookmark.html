<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf</title>

    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">

    <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">

    <link rel="stylesheet" th:href="@{/client/css/library/bookshelf.css}">

    <link rel="stylesheet" th:href="@{/client/css/library/bookmark.css}">

    <link rel="stylesheet" th:href="@{/client/css/navitigation.css}">

    <link rel="stylesheet" th:href="@{/client/css/font.css}">
</head>

<body>
    <div th:replace="~{client/layout/navigation :: navbar}"></div>

    <main class="library-page" style="min-height: 100vh; padding-top: 95px;">
        <div class="container">
            <div class="row d-block clearfix">
                <div class="col-12 col-lg-3 float-end">
                    <section class="private-tabs">
                        <header>
                            <h4 class="section-name">Tài khoản</h4>
                            <span class="user-name" sec:authentication="name"></span>
                        </header>
                        <ul class="user-private-tabs">
                            <li class="">
                                <a th:href="@{/bookshelf}">
                                    <span class="d-none d-lg-inline">
                                        <i class="fas fa-chevron-left"></i>
                                    </span>

                                    <span class="d-lg-none float-end">
                                        <i class="fas fa-chevron-down"></i>
                                    </span>
                                    Bookshelf
                                </a>
                            </li>
                            <li class="current">
                                <a th:href="@{/bookshelf/bookmark}">
                                    <span class="d-none d-lg-inline">
                                        <i class="fas fa-chevron-left"></i>
                                    </span>

                                    <span class="d-lg-none float-end">
                                        <i class="fas fa-chevron-down"></i>
                                    </span>
                                    Bookmark
                                </a>
                            </li>
                        </ul>
                    </section>
                </div>

                <div class="col-12 col-lg-9 float-start">
                    <section class="bookmark-section">
                        <header class="sect-header">
                            <span class="sect-title">Danh sách đánh dấu</span>
                        </header>

                        <main class="sect-body" style="padding: 10px; display: block;">
                            <p class="text-muted" th:if="${#lists.isEmpty(bookmarkItems)}">Chưa có chapter nào được
                                bookmark.</p>

                            <article class="bookmark-item clear" th:each="item : ${bookmarkItems}">
                                <div class="series-cover">
                                    <div class="a6-ratio" style="position: relative;">
                                        <img class="content img-in-ratio"
                                            th:src="@{/images/novel/{image}(image=${item.novel.image})}"
                                            th:alt="${item.novel.title}">
                                    </div>
                                </div>

                                <div class="series-title">
                                    <a th:href="@{/novel/{id}(id=${item.novel.id},from='bookshelf')}" class=""
                                        th:text="${item.novel.title}"></a>
                                    <span class="bm-toggle_symbol" style="cursor: pointer">
                                        <i class="fas fa-chevron-down"></i>
                                    </span>
                                </div>

                                <div class="none bm-toggle clear" style="display: none;">
                                    <ul class="bookmarks-list clear">
                                        <li th:each="chapter : ${item.chapters}">
                                            <div class="chapter-title">
                                                <a th:href="@{/reader/{novelId}/{chapterId}(novelId=${item.novel.id},chapterId=${chapter.id})}"
                                                    th:text="${chapter.title}"></a>
                                            </div>
                                        </li>
                                    </ul>
                                </div>

                            </article>


                        </main>
                    </section>
                </div>


                <!-- <div style="text-align: center; margin: 0 auto 10px auto;"></div> -->
            </div>
        </div>
    </main>

    <footer class="footer text-center py-4">
        <h4>© 2026 berryNovel</h4>
    </footer>

    <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>

    <script th:src="@{/client/js/navitigation.js}"></script>

    <script>
        document.querySelectorAll(".bm-toggle_symbol").forEach(btn => {
            btn.addEventListener("click", function () {

                const bookmarkItem = this.closest(".bookmark-item");
                const chapterList = bookmarkItem.querySelector(".bm-toggle");

                if (chapterList.style.display === "block") {
                    chapterList.style.display = "none";
                } else {
                    chapterList.style.display = "block";
                }
            });
        });
    </script>
</body>

</html>
