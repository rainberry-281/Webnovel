<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf</title>

    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">

    <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">

    <link rel="stylesheet" th:href="@{/client/css/library/bookshelf.css}">

    <link rel="stylesheet" th:href="@{/client/css/navitigation.css}">

    <link rel="stylesheet" th:href="@{/client/css/font.css}">
</head>

<body>
    <div th:replace="~{client/layout/navigation :: navbar}"></div>

    <main class="library-page" style="min-height: 100vh; padding-top: 85px;">
        <div class="container">
            <div class="row d-block clearfix">
                <div class="col-12 col-lg-3 float-end">
                    <section class="private-tabs">
                        <header>
                            <h4 class="section-name">Tài khoản</h4>
                            <span class="user-name" sec:authentication="name"></span>
                        </header>
                        <ul class="user-private-tabs">
                            <li class="current">
                                <a th:href="@{/bookshelf}">
                                    <span class="d-none d-lg-inline">
                                        <i class="fas fa-chevron-left"></i>
                                    </span>

                                    <span class="d-lg-none float-end">
                                        <i class="fas fa-chevron-down"></i>
                                    </span>
                                    Bookshelf
                                </a>
                            </li>
                            <li class="">
                                <a th:href="@{/bookshelf/bookmark}">
                                    <span class="d-none d-lg-inline">
                                        <i class="fas fa-chevron-left"></i>
                                    </span>

                                    <span class="d-lg-none float-end">
                                        <i class="fas fa-chevron-down"></i>
                                    </span>
                                    Bookmark
                                </a>
                            </li>
                        </ul>
                    </section>
                </div>

                <div class="col-12 col-lg-9 float-start">
                    <form th:action="@{/bookshelf/delete}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="pad-bottom-20" style="padding-bottom: 20px;">
                            <div class="delete-button-container d-flex justify-content-start" style>
                                <button class="btn btn-danger rounded-pill fw-bold px-3" type="submit">Xóa đã
                                    chọn</button>
                            </div>
                        </div>

                        <table class="table table-borderless listext-table has-covers" style="table-layout: fixed;">
                            <tbody>
                                <tr>
                                    <th style="width: 2rem;"></th>
                                    <th class="col-10 col-md-8">Tên truyện</th>
                                    <th class="none table-cell-m col-md-4">Mới nhất</th>
                                </tr>

                                <tr th:if="${#lists.isEmpty(bookshelfItems)}">
                                    <td colspan="3" class="text-center py-4">Chưa có truyện trong thư viện.</td>
                                </tr>

                                <tr th:each="item : ${bookshelfItems}">
                                    <td class="text-clip align-middle">
                                        <input type="checkbox" class="select-item" name="novelIds"
                                            th:value="${item.novel.id}">
                                    </td>

                                    <td>
                                        <div class="a6-ratio novel-cover">
                                            <img class="content img-in-ratio"
                                                th:src="@{/images/novel/{image}(image=${item.novel.image})}"
                                                th:alt="${item.novel.title}">
                                        </div>

                                        <div class="novel-name" style="padding-left: 50px;">
                                            <a th:href="@{/novel/{id}(id=${item.novel.id},from='bookshelf')}"
                                                class="overlay" th:text="${item.novel.title}"></a>
                                        </div>
                                    </td>

                                    <td class="none table-cell-m">
                                        <a class="overlay" th:if="${item.newestChapter != null}"
                                            th:href="@{/reader/{novelId}/{chapterId}(novelId=${item.novel.id},chapterId=${item.newestChapter.id})}"
                                            th:text="${item.newestChapter.title}"></a>
                                        <small class="volume-name" th:if="${item.newestChapter != null}"
                                            th:text="${#temporals.format(item.newestChapter.createdAt, 'dd/MM/yyyy')}"></small>
                                        <span th:if="${item.newestChapter == null}">Chưa có chương</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </form>
                </div>

                <div style="text-align: center; margin: 0 auto 10px auto;"></div>
            </div>
        </div>

    </main>

    <footer class="footer text-center py-4">
        <h4>© 2026 berryNovel</h4>
    </footer>

    <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>


    <script th:src="@{/client/js/navitigation.js}"></script>
</body>

</html>
