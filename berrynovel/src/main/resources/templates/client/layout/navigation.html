<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<body>

    <nav th:fragment="navbar" id="mainNavbar"
        class="navbar navbar-expand-lg navbar-light custom-navbar shadow-sm fixed-top headroom">
        <div class="container align-items-center">

            <div class="d-flex align-items-center gap-3 flex-grow-1">

                <div th:replace="~{client/layout/logo :: logo}"></div>
                <form class="search-form d-none d-md-flex">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" class="form-control border-start-0" placeholder="Tìm truyện">
                    </div>
                </form>

            </div>

            <div class="collapse navbar-collapse " id="mainNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-4">
                    <li class="nav-item"><a class="nav-link active" th:href="@{/}">Home</a></li>
                    <!-- <li class="nav-item"><a class="nav-link active" href="../category/category.html">Genre</a></li>
                <li class="nav-item"><a class="nav-link active" href="../library/bookshelf.html">Library</a></li> -->
                    <li class="nav-item fw-bold" sec:authorize="!isAuthenticated()">
                        <a th:href="@{/login}">Login</a> /
                        <a th:href="@{/register}">Register</a>
                    </li>

                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#"
                            data-bs-toggle="dropdown">

                            <img th:src="@{/images/avatar/{image}(image=${(session.avatar != null and !#strings.isEmpty(session.avatar)) ? session.avatar : 'defaultavatar.png'},v=${#dates.createNow().time})}"
                                class="rounded-circle user-avatar">
                            <!-- <span sec:authentication="name"></span> -->
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/profile}">Profile</a></li>

                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button class="dropdown-item">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
