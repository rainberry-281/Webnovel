<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter</title>

    <link rel="stylesheet" th:href="@{/client/css/main.css}">

    <link rel="stylesheet" th:href="@{/client/css/chapter.css}">

    <!-- <link rel="stylesheet" th:href="@{/client/css/font.css}"> -->

    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">

    <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- <div id="navbar"></div> -->

    <div class="reading-page">
        <section class="rd-side-icons">
            <a class="rd_sd-button_item rd_top-left"
                th:href="${prev != null} ? @{/reader/{novelId}/{chapterId}(novelId=${novel.id},chapterId=${prev.id})} : '#'"
                th:classappend="${prev == null} ? ' disabled'">
                <i class="fas fa-backward"></i>
            </a>

            <a class="rd_sd-button_item" th:href="@{/novel/{id}(id=${novel.id})}"><i class="fas fa-home"></i></a>
            <a id="rd-info-btn" class="rd_sd-button_item"><i class="fas fa-info"></i></a>
            <div sec:authorize="isAuthenticated()" class="bookmark-toggle-form">
                <button type="button" id="bookmark-btn" class="rd_sd-button_item"
                    th:attr="data-novel-id=${novel.id},data-chapter-id=${chapter.id},data-bookmarked=${isBookmarked},data-csrf=${_csrf.token},data-csrf-param=${_csrf.parameterName}"
                    th:title="${isBookmarked} ? 'Remove chapter bookmark' : 'Bookmark chapter'">
                    <i th:class="${isBookmarked} ? 'fas fa-bookmark' : 'far fa-bookmark'"></i>
                </button>
            </div>

            <a sec:authorize="!isAuthenticated()" class="rd_sd-button_item" th:href="@{/login}">
                <i class="far fa-bookmark"></i>
            </a>


            <a class="rd_sd-button_item rd_top-right"
                th:href="${next != null} ? @{/reader/{novelId}/{chapterId}(novelId=${novel.id},chapterId=${next.id})} : '#'"
                th:classappend="${next == null} ? ' disabled'">
                <i class="fas fa-forward"></i>
            </a>
        </section>

        <section class="rd_sidebar rdtoggle" aria-hidden="true">
            <main class="rdtoggle_body animation fade-in-left-big">
                <header class="rd_sidebar-header">
                    <a th:href="@{/novel/{id}(id=${novel.id})}" class="novel-image">
                        <img th:src="@{/images/novel/{image}(image=${novel.image})}" alt="Cover image">
                    </a>

                    <div class="rd_sidebar-name">
                        <h5>
                            <a th:href="@{/novel/{id}(id=${novel.id})}" th:text="${novel.title}"></a>
                        </h5>

                        <small>
                            <i class="fas fa-pen"></i>
                            <span th:text="${novel.author}"></span>
                        </small>
                    </div>
                </header>

                <!-- <ul id="chap_list" class="unstyled"> -->
                <ul class="sub-chap_list unstyled">
                    <li th:each="chap : ${chapters}" th:classappend="${chap.id == chapter.id} ? ' current'">
                        <a th:href="@{/reader/{novelId}/{chapterId}(novelId=${novel.id}, chapterId=${chap.id})}"
                            th:text="${chap.title}">
                        </a>
                    </li>
                </ul>
                <!-- </ul> -->
            </main>
        </section>

        <div class="black-click"></div>

        <div class="container">
            <div class="row">
                <div class="reading-content col-12 col-lg-10 offset-lg-1" style="word-wrap: break-word;">
                    <div class="title-top" style="padding-top: 20px;">
                        <h2 class="title-item text-xl font-bold text-center" th:text="${novel.title}"></h2>

                        <h4 class="title-item text-base font-bold text-center" th:text="${chapter.title}"></h4>
                    </div>

                    <div style="text-align: center; margin: 20px auto -20px auto;"></div>

                    <div id="chapter-content" class="long-text text-justify" style="padding: 30px 0"
                        th:utext="${chapter.content}">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const sidebar = document.querySelector(".rd_sidebar");
            const toggleBtn = document.getElementById("rd-info-btn");
            const overlay = document.querySelector(".black-click");

            function openSidebar() {
                sidebar.classList.add("on");
                document.body.classList.add("sidebar-open");
                sidebar.setAttribute("aria-hidden", "false");
            }

            function closeSidebar() {
                sidebar.classList.remove("on");
                document.body.classList.remove("sidebar-open");
                sidebar.setAttribute("aria-hidden", "true");
            }

            function toggleSidebar() {
                sidebar.classList.toggle("on");

                const isOpen = sidebar.classList.contains("on");
                document.body.classList.toggle("sidebar-open", isOpen);
                sidebar.setAttribute("aria-hidden", !isOpen);
            }

            toggleBtn.addEventListener("click", toggleSidebar);

            overlay.addEventListener("click", closeSidebar);

            document.addEventListener("keydown", function (e) {
                if (e.key === "Escape") {
                    closeSidebar();
                }
            });

        });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const current = document.querySelector(".rd_sidebar li.current");
            if (current) {
                current.scrollIntoView({ block: "center" });
            }
        });
    </script>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            const content = document.getElementById("chapter-content");
            if (!content) return;

            const savedKey = /*[[${savedParagraphKey}]]*/ null;
            const savedPosition = /*[[${savedLinePosition}]]*/ null;
            const isInitiallyBookmarked = /*[[${isBookmarked}]]*/ false;
            const fromBookmark = new URLSearchParams(window.location.search).get("from") === "bookmark";
            const INDICATOR_ID = "bm-indicator-icon";

            function getParagraphs() {
                const paragraphs = Array.from(content.querySelectorAll("p, div.paragraph"));
                return paragraphs.length ? paragraphs : [content];
            }

            function escapeSelectorValue(value) {
                if (value == null) return "";
                return window.CSS && CSS.escape ? CSS.escape(String(value)) : String(value).replace(/"/g, "\\\"");
            }

            function prepareParagraphs() {
                getParagraphs().forEach((paragraph, index) => {
                    if (!paragraph.dataset.key) {
                        paragraph.dataset.key = "p-" + index;
                    }
                    paragraph.classList.add("bm-paragraph");
                });
            }

            function findBookmarkTarget(paragraphKey, linePosition) {
                let target = null;
                if (paragraphKey) {
                    target = content.querySelector('[data-key="' + escapeSelectorValue(paragraphKey) + '"]');
                }
                if (!target && linePosition != null) {
                    target = getParagraphs()[Number(linePosition)] || null;
                }
                return target;
            }

            function removeBookmarkIndicator(immediate) {
                const icon = document.getElementById(INDICATOR_ID);
                if (!icon) return;

                if (immediate) {
                    icon.remove();
                    return;
                }

                icon.classList.remove("visible");
                setTimeout(() => icon.remove(), 300);
            }

            function renderBookmarkIndicator(paragraphKey, linePosition) {
                removeBookmarkIndicator(true);

                if (paragraphKey == null && linePosition == null) return;

                const target = findBookmarkTarget(paragraphKey, linePosition);
                if (!target) return;

                const icon = document.createElement("span");
                icon.id = INDICATOR_ID;
                icon.className = "bm-line-indicator";
                icon.innerHTML = '<i class="fas fa-bookmark"></i>';
                icon.setAttribute("title", "Your bookmark position");

                target.appendChild(icon);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => icon.classList.add("visible"));
                });
            }

            function scrollToSavedPosition() {
                const target = findBookmarkTarget(savedKey, savedPosition);
                if (target) {
                    target.scrollIntoView({ behavior: "smooth", block: "start" });
                    return;
                }
                window.scrollTo({ top: 0, behavior: "smooth" });
            }

            function getCurrentBookmarkPosition() {
                const paragraphs = getParagraphs();
                let bestIndex = 0;

                for (let i = 0; i < paragraphs.length; i++) {
                    const rect = paragraphs[i].getBoundingClientRect();
                    if (rect.top >= 0) {
                        bestIndex = i;
                        break;
                    }
                    if (rect.bottom > 0) {
                        bestIndex = i;
                    }
                }

                const target = paragraphs[bestIndex] || content;
                return {
                    linePosition: bestIndex,
                    paragraphKey: target.dataset.key || ("p-" + bestIndex)
                };
            }

            async function postBookmarkAction(url, params, csrf, csrfParam) {
                const body = new URLSearchParams(params || {});
                if (csrf && csrfParam) {
                    body.set(csrfParam, csrf);
                }

                return fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
                        "X-CSRF-TOKEN": csrf || ""
                    },
                    body
                });
            }

            prepareParagraphs();

            if (isInitiallyBookmarked) {
                renderBookmarkIndicator(savedKey, savedPosition);
            }

            if (fromBookmark) {
                if (document.readyState === "complete") {
                    scrollToSavedPosition();
                } else {
                    window.addEventListener("load", scrollToSavedPosition, { once: true });
                }
            }

            const btn = document.getElementById("bookmark-btn");
            if (!btn) return;

            btn.addEventListener("click", async function (event) {
                event.preventDefault();
                event.stopPropagation();

                if (btn.dataset.loading === "true") return;
                btn.dataset.loading = "true";
                btn.disabled = true;

                const novelId = btn.dataset.novelId;
                const chapterId = btn.dataset.chapterId;
                const csrf = btn.dataset.csrf;
                const csrfParam = btn.dataset.csrfParam;
                const icon = btn.querySelector("i");
                const isBookmarked = btn.dataset.bookmarked === "true";

                try {
                    if (isBookmarked) {
                        const res = await postBookmarkAction(
                            `/bookshelf/bookmark/delete/${novelId}/${chapterId}`,
                            {},
                            csrf,
                            csrfParam
                        );
                        if (!res.ok) throw new Error("Delete bookmark failed");

                        btn.dataset.bookmarked = "false";
                        btn.setAttribute("title", "Bookmark chapter");
                        if (icon) icon.className = "far fa-bookmark";
                        removeBookmarkIndicator(false);
                        return;
                    }

                    const current = getCurrentBookmarkPosition();
                    const res = await postBookmarkAction(
                        `/bookshelf/bookmark/upsert/${novelId}/${chapterId}`,
                        current,
                        csrf,
                        csrfParam
                    );
                    if (!res.ok) throw new Error("Save bookmark failed");

                    btn.dataset.bookmarked = "true";
                    btn.setAttribute("title", "Remove chapter bookmark");
                    if (icon) icon.className = "fas fa-bookmark";
                    renderBookmarkIndicator(current.paragraphKey, current.linePosition);
                } catch (error) {
                    console.error(error);
                } finally {
                    btn.dataset.loading = "false";
                    btn.disabled = false;
                }
            });
        });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const icons = document.querySelector(".rd-side-icons");

            document.addEventListener("click", function (e) {

                // Do not toggle when clicking inside the sidebar.
                if (e.target.closest(".rd_sidebar")) return;

                icons.classList.toggle("show");
            });

        });
    </script>
</body>

</html>
