<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>berryNovel - Thế giới truyện chữ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" th:href="@{/client/css/novel_detail.css}">

    <link rel="stylesheet" th:href="@{/client/css/navitigation.css}">

    <link rel="stylesheet" th:href="@{/client/css/font.css}">

    <link rel="stylesheet" th:href="@{/client/css/main.css}">

</head>

<body>
    <div th:replace="~{client/layout/navigation :: navbar}"></div>

    <div class="page-wrapper" style="padding-top: 55px;">
        <nav aria-label="breadcrumb" class="pt-4">
            <ol class="breadcrumb ms-3">
                <li class="breadcrumb-item"><a th:href="@{/home}" class="text-decoration-none text-dark">Homepage</a>
                </li>
                <li class="breadcrumb-item" th:if="${breadcrumbFrom == 'category'}">
                    <a th:href="@{/category}" class="text-decoration-none text-dark">Category</a>
                </li>
                <li class="breadcrumb-item" th:if="${breadcrumbFrom == 'bookshelf'}">
                    <a th:href="@{/bookshelf}" class="text-decoration-none text-dark">Bookshelf</a>
                </li>
                <li th:text="${novel.title}" class="breadcrumb-item active" aria-current="page"></li>
            </ol>
        </nav>

        <div class="novel container">

            <div class="row align-items-stretch g-4">
                <div class="col-lg-3">
                    <div class="cover-wrapper">
                        <img th:src="@{/images/novel/{image}(image=${novel.image})}" class="img-fluid rounded-4 shadow"
                            alt="Ảnh bìa">
                    </div>
                </div>

                <div class="col-lg-9">
                    <div class="row mt-3">
                        <div class="info-card p-4 h-100">
                            <h2 class="fw-bold mb-3" th:text="${novel.title}"></h2>

                            <div class="mb-3">
                                <span th:each="genre : ${novel.genres}" class="badge bg-secondary me-1"
                                    th:text="${genre.name}">
                                </span>
                            </div>

                            <div class="col-md-6"><strong>Author:</strong> <span th:text="${novel.author}"></span>
                            </div>
                            <div class="col-md-6"><strong>Progress:</strong>
                                <span class="text-success"
                                    th:text="${novel.progress != null ? novel.progress.displayName : 'Unknown'}"></span>
                            </div>
                            <div class="col-md-6"><strong>Last Updated:</strong>
                                <span
                                    th:text="${latestChapter != null ? #temporals.format(latestChapter.createdAt, 'dd/MM/yyyy') : (novel.createdAt != null ? #temporals.format(novel.createdAt, 'dd/MM/yyyy') : '-')}">
                                    -
                                </span>
                            </div>

                            <form sec:authorize="isAuthenticated()"
                                th:action="@{/bookshelf/toggle/{novelId}(novelId=${novel.id})}" method="post"
                                class="mt-3">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="bookmark-btn"
                                    th:title="${inBookshelf} ? 'Bỏ khỏi tủ sách' : 'Thêm vào tủ sách'">
                                    <i
                                        th:class="${inBookshelf} ? 'fa-solid fa-heart bookmark active' : 'fa-regular fa-heart bookmark'"></i>
                                </button>
                            </form>

                            <a sec:authorize="!isAuthenticated()" th:href="@{/login}"
                                class="bookmark-login-link mt-3 d-inline-block" title="Đăng nhập để thêm vào thư viện">
                                <i class="fa-regular fa-heart bookmark"></i>
                            </a>

                            <div class="mt-4">
                                <a th:if="${firstChapter != null}"
                                    th:href="@{/reader/{novelId}/{chapterId}(novelId=${novel.id},chapterId=${firstChapter.id})}"
                                    class="btn btn-outline-primary me-2">
                                    Đọc từ đầu
                                </a>

                                <a th:if="${latestChapter != null}"
                                    th:href="@{/reader/{novelId}/{chapterId}(novelId=${novel.id},chapterId=${latestChapter.id})}"
                                    class="btn btn-outline-secondary">
                                    <i class="fa-solid fa-bolt me-1"></i> Chương mới nhất
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-5">
                <div class="col-12">
                    <div class="intro-card p-4 p-md-5">
                        <h4 class="fw-bold mb-4">Giới thiệu</h4>

                        <div th:utext="${novel.description}" class="intro-text" id="introText">
                        </div>

                        <button id="toggleBtn">Xem thêm</button>
                    </div>
                </div>
            </div>

            <section class="volume-list mt-5 rounded-4">
                <header class="sect-header">
                    <span class="sect-title">
                        Danh sách chương
                    </span>
                </header>

                <main class="d-lg-block">
                    <div class="row">
                        <div class="col-12">
                            <ul class="list-chapters">
                                <li th:each="chapter : ${chapters}">
                                    <div class="chapter-name fw-semibold">
                                        <a
                                            th:href="@{/reader/{novelId}/{chapterId}(novelId=${novel.id}, chapterId=${chapter.id})}">
                                            <span th:text="${chapter.title}"></span>
                                        </a>
                                    </div>
                                    <div class="chapter-time"
                                        th:text="${#temporals.format(chapter.createdAt, 'dd/MM/yyyy')}"></div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </main>
            </section>

            <section id="comments" class="comment-section mt-5 rounded-4">

                <header class="sect-header">
                    <span class="sect-title">
                        Bình luận
                    </span>
                </header>

                <main class="p-3">
                    <!-- Form comment -->
                    <form sec:authorize="isAuthenticated()" class="comment-form mb-4"
                        th:action="@{/novel/{id}/comment(id=${novel.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <textarea class="form-control mb-2 rounded-2" rows="3" name="content"
                            placeholder="Viết bình luận..." required></textarea>
                        <div class="text-end">
                            <button class="btn btn-primary" type="submit">
                                Gửi bình luận
                            </button>
                        </div>
                    </form>

                    <div sec:authorize="!isAuthenticated()" class="comment-form mb-4">
                        <p class="mb-0">
                            <a th:href="@{/login}">Đăng nhập</a> để bình luận.
                        </p>
                    </div>

                    <!-- List comment -->
                    <div class="comment-list">
                        <div class="comment-item" th:if="${#lists.isEmpty(comments)}">
                            <div class="comment-text">
                                Chưa có bình luận nào.
                            </div>
                        </div>

                        <div class="comment-item" th:each="comment : ${comments}">
                            <div class="comment-user">
                                <img class="comment-avatar"
                                    th:src="@{/images/avatar/{image}(image=${comment.user != null and comment.user.image != null and !#strings.isEmpty(comment.user.image) ? comment.user.image : 'defaultavatar.png'},v=${#dates.createNow().time})}"
                                    alt="Avatar" />
                                <div class="comment-meta">
                                    <div class="comment-header">
                                        <span class="comment-name"
                                            th:text="${comment.user != null ? (comment.user.username != null and !#strings.isEmpty(comment.user.username) ? comment.user.username : 'Unknown') : 'Unknown'}"></span>
                                        <div class="comment-actions">
                                            <span class="comment-time"
                                                th:text="${comment.createdAt != null ? #temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm') : ''}"></span>
                                            <form method="post" class="comment-delete-form"
                                                th:if="${#authorization.expression('hasRole(''ADMIN'')') or (#authentication != null and comment.user != null and comment.user.username == #authentication.name)}"
                                                th:action="@{/novel/{novelId}/comment/{commentId}/delete(novelId=${novel.id},commentId=${comment.id})}">
                                                <input type="hidden" th:name="${_csrf.parameterName}"
                                                    th:value="${_csrf.token}" />
                                                <button type="submit" class="comment-delete-btn">Xóa</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="comment-text" th:text="${comment.content}"></div>
                        </div>
                    </div>
                </main>
            </section>
        </div>
    </div>

    <footer class="footer text-center py-4">
        <h4>© 2026 berryNovel</h4>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/client/js/navitigation.js}"></script>

    <script>
        const btn = document.getElementById("toggleBtn");
        const text = document.getElementById("introText");

        if (btn && text) {
            text.classList.remove("expanded");
            btn.innerText = "Xem thêm";

            // Check if text needs truncation
            const checkIfTruncationNeeded = () => {
                const actualHeight = text.scrollHeight;
                const maxHeight = 120;

                if (actualHeight > maxHeight) {
                    btn.style.display = "block";
                } else {
                    text.classList.remove("expanded");
                    btn.innerText = "Xem thêm";
                    btn.style.display = "none";
                }
            };

            // Initial check
            setTimeout(checkIfTruncationNeeded, 100);

            // Toggle functionality
            btn.addEventListener("click", function () {
                text.classList.toggle("expanded");

                if (text.classList.contains("expanded")) {
                    btn.innerText = "Thu gọn";
                } else {
                    btn.innerText = "Xem thêm";
                }
            });

            // Check again on window resize
            window.addEventListener("resize", checkIfTruncationNeeded);
        }
    </script>
</body>

</html>
