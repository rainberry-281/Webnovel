<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/client/css/register.css}">

    <link rel="stylesheet" th:href="@{/client/css/logo.css}">

    <link rel="stylesheet" th:href="@{/client/css/main.css}">

    <link rel="stylesheet" th:href="@{/client/css/font.css}">
</head>

<body>
    <div th:replace="~{client/layout/logo :: logo}"></div>

    <div class="register-box">
        <h2>Register</h2>

        <form th:action="@{/register}" method="post" th:object="${newUser}">
            <div class="form-group">
                <input th:field="*{fullName}" type="text" id="fullName" placeholder=" ">
                <label for="fullName">Fullname</label>
            </div>

            <div class="form-group">
                <input th:field="*{username}" type="text" id="username" placeholder=" ">
                <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></div>
                <label for="username">Username</label>
            </div>

            <div class="form-group">
                <input th:field="*{email}" type="text" id="email" placeholder=" ">
                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></div>
                <label for="email">Email</label>
            </div>

            <div class="form-group">
                <input th:field="*{phoneNumber}" type="tel" id="phoneNumber" placeholder=" ">
                <div th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="text-danger"></div>
                <label for="phoneNumber">Phone Number</label>
            </div>

            <div class="form-group">
                <input th:field="*{password}" type="password" id="password" placeholder=" ">
                <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></div>
                <label for="password">Password</label>
            </div>

            <div class="form-group">
                <input th:field="*{confirmPassword}" type="password" id="confirmPassword" placeholder=" ">
                <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="text-danger">
                </div>
                <label for="confirmPassword">Confirm Password</label>
            </div>

            <button type="submit">Register</button>
        </form>
    </div>

    <!-- <script th:src="@{/client/js/logo.js}"></script> -->
</body>

</html>
