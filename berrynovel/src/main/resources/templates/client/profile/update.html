                                <div class="row">
                                    <div class="col-md-12 mb-3">

                                        <label class="form-label fw-bold">Email:</label>

                                            value="nguyennhatanh533@gmail.com">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label fw-bold">User name:</label>
                                        <input id="username" name="username" style="padding-left: 20px;" type="text"

                                            value="B23DCCN035">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <input id="fullName" name="fullName" style="padding-left: 20px;" type="text"

                                    </div>

                                    <div class="col-md-12 mb-3">

                                        <label class="form-label fw-bold">Phone number:</label>
                                        <input id="phoneNumber" name="phoneNumber" style="padding-left: 20px;"
                                            type="number" class="form-control border " value="">

                                    </div>


                                    <div class="col-md-12 mb-3">
                                        <label class="form-label fw-bold">Address:</label>
                                        <textarea id="address" name="address" style="padding-left: 20px;"
                                            class="form-control border"></textarea>
                                    </div>


                                    <div class="col-md-6 mb-3" style="display: none;">
                                        <label class="form-label fw-bold">Image:</label>
                                        <input id="image" name="image" style="padding-left: 20px;" type="text"
                                            class="form-control border" value="defaultavatar.jpg">
                                    </div>

                                    <div class="col-md-12 mb-3 ">
                                        <label class="form-label fw-bold">Avatar:</label>
                                        <div class="d-flex align-items-center gap-3">
                                            <label for="formFileLg" class="upload-box">
                                                <i class="fa-solid fa-cloud-arrow-up"></i>
                                                <span>Upload image</span>
                                            </label>
                                        </div>

                                    </div>

                                </div>
