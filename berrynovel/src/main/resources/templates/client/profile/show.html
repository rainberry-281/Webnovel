<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- <link rel="stylesheet" href="/src/main/webapp/resources/client/css/navitigation.css"> -->

    <link rel="stylesheet" th:href="@{/client/css/profile/profile.css}">

    <link rel="stylesheet" th:href="@{/client/css/navitigation.css}">

</head>

<body>

    <div th:replace="~{client/layout/navigation :: navbar}"></div>

    <div class="page-wrapper">
        <div class="container profile-card">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card shadow-lg border-0 rounded-3">

                        <div class="card-header theme-gradient-bg text-white p-4 rounded-top-3">
                            <h4 class="mb-0">
                                <i class="bi bi-person-badge-fill me-2"></i> User profile
                            </h4>
                        </div>

                        <div class="card-body p-4 p-md-5">

                            <div class="text-center mb-5 border-bottom pb-4">
                                <img th:src="@{'/images/avatar/' + (${user.image} != null ? ${user.image} : 'defaultavatar.png') + '?v=' + ${#dates.createNow().time}}"
                                    class="rounded-circle profile-avatar">
                                <h3 class="mt-3 fw-bold" th:text="${user.username}"></h3>
                            </div>

                            <div class="row g-4">

                                <div class="username col-md-6">
                                    <p class="info-label">Username</p>
                                    <div class="info-value">
                                        <i class="fa-solid fa-circle-user icon"></i> <span
                                            th:text="${user.username}"></span>
                                    </div>
                                </div>

                                <div class="fullname col-md-6">
                                    <p class="info-label">Fullname</p>
                                    <div class="info-value">
                                        <i class="fa-solid fa-id-card icon"></i> <span
                                            th:text="${user.fullName}"></span>
                                    </div>
                                </div>

                                <div class="email col-md-6">
                                    <p class="info-label">Email</p>
                                    <div class="info-value">
                                        <i class="fa-solid fa-envelope icon"></i> <span th:text="${user.email}"></span>
                                    </div>
                                </div>

                                <div class="sdt col-md-6">
                                    <p class="info-label">Phone Number</p>
                                    <div class="info-value">
                                        <i class="fa-solid fa-phone icon"></i> <span
                                            th:text="${user.phoneNumber}"></span>
                                    </div>
                                </div>

                            </div>

                            <div class="d-flex justify-content-end mt-5 pt-4 border-top gap-3">
                                <a th:href="@{/profile/edit}" class="btn fw-bold theme-gradient-bg">
                                    <i class="bi bi-pencil-square me-1"></i> Edit profile
                                </a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center py-4">
        <h4>© 2026 berryNovel</h4>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
