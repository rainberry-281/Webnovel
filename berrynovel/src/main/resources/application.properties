spring.application.name=berrynovel
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/berrynovel
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.show-sql: true


#config spring security
# spring.security.user.name=rainberry
# spring.security.user.password=123456

# Tắt cache để phát triển (development) thuận tiện
spring.thymeleaf.cache=false

# Quy định đuôi file và tiền tố (mặc định đã là thế này rồi)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

#default = 1MB
spring.servlet.multipart.max-file-size=50MB
#default = 10 MB (form data)
spring.servlet.multipart.max-request-size=50MB

#config-session
spring.session.store-type=jdbc
spring.session.timeout=30m
#spring.session.jdbc.initialize-schema=always
#server.servlet.session.timeout
#spring.session.jdbc.table-name=SPRING_SESSION

logging.level.org.springframework.security=DEBUG
logging.pattern.console=%msg%n